<body style="padding-top:48px"><div style="position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)"><a href="/" style="display:flex;align-items:center;gap:.4rem;text-decoration:none;font-size:.82rem;font-weight:700;color:#a78bfa">← Back</a><a href="/" style="display:flex;align-items:center;gap:.3rem;text-decoration:none;font-size:.82rem;font-weight:800;color:#e0e0e0">🛠️ TinyTools</a></div>
<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>
<div class="hero"><h1>🔲 <em>Contrast Ratio</em></h1><p>Check WCAG contrast ratio between two colors</p></div>
<div class="container">
<div class="card"><div class="grid-2">
<div><label>Foreground</label><input type="color" id="fg" value="#ffffff" oninput="check()"></div>
<div><label>Background</label><input type="color" id="bg" value="#1a1a2e" oninput="check()"></div></div></div>
<div class="card"><div id="preview" style="padding:2rem;border-radius:12px;text-align:center">
<span style="font-size:1.5rem;font-weight:700" id="sample">Sample Text</span>
<p id="small" style="font-size:.85rem;margin-top:.5rem">Small body text sample</p></div></div>
<div class="stats-row">
<div class="stat"><div class="stat-num" id="ratio">-</div><div class="stat-label">Ratio</div></div>
<div class="stat"><div class="stat-num" id="aa">-</div><div class="stat-label">AA Normal</div></div>
<div class="stat"><div class="stat-num" id="aaa">-</div><div class="stat-label">AAA Normal</div></div>
</div>
</div>
<footer>Part of <a href="../" style="color:var(--accent);text-decoration:none;font-weight:600">TinyTools</a> — free tools for builders</footer>
<script>
function copyText(id){const el=document.getElementById(id);const t=el.innerText||el.value;navigator.clipboard.writeText(t);const btn=el.parentElement.querySelector('.copy-btn')||el.nextElementSibling;if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1200)}}
function lum(hex){const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
const[R,G,B]=[r,g,b].map(c=>c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4));return .2126*R+.7152*G+.0722*B}
function check(){const fg=document.getElementById('fg').value,bg=document.getElementById('bg').value;
const l1=lum(fg),l2=lum(bg);const ratio=((Math.max(l1,l2)+.05)/(Math.min(l1,l2)+.05));
document.getElementById('preview').style.background=bg;document.getElementById('sample').style.color=fg;document.getElementById('small').style.color=fg;
document.getElementById('ratio').textContent=ratio.toFixed(2)+':1';
document.getElementById('aa').textContent=ratio>=4.5?'✅ Pass':'❌ Fail';
document.getElementById('aaa').textContent=ratio>=7?'✅ Pass':'❌ Fail'}
check()
</script>
