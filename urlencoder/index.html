<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Encode & Decode URLs Free Online</title>
<meta name="description" content="Encode and decode URLs. Handle special characters, query strings, Unicode. Free URL encoder and decoder tool.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#e8e6df;min-height:100vh;color:#16130f}main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
textarea{width:100%;height:120px;padding:.7rem;background:#e8e6df;border:1px solid #f3f1ea;border-radius:10px;color:#16130f;font-family:'SF Mono',monospace;font-size:.82rem;resize:vertical;outline:none;line-height:1.5}
textarea:focus{border-color:#f59e0b}
label{display:block;font-size:.62rem;text-transform:uppercase;color:#888;font-weight:600;margin-bottom:.3rem;margin-top:1rem}
.btns{display:flex;gap:.5rem;margin:1rem 0;flex-wrap:wrap}
.btn{flex:1;padding:.5rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;color:#16130f}
.btn-encode{background:#f59e0b;color:#000}.btn-decode{background:#d6451f}
.btn-sm{background:#f3f1ea;color:#ccc;padding:.35rem .6rem;font-size:.72rem;border-radius:6px;cursor:pointer;border:none}
.mode{display:flex;gap:.3rem;margin:.8rem 0}
.mode-btn{padding:.3rem .6rem;border-radius:5px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid rgba(22,19,15,.13);color:#888;background:#e8e6df}
.mode-btn.active{border-color:#f59e0b;color:#f59e0b}
.parsed{background:#e8e6df;border:1px solid #f3f1ea;border-radius:10px;padding:1rem;margin-top:1rem;display:none}
.parsed h3{font-size:.65rem;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:.5rem}
.param{display:flex;justify-content:space-between;font-size:.75rem;padding:.3rem .4rem;background:#e8e6df;border-radius:4px;margin-bottom:.2rem;gap:.5rem}
.param .key{color:#f59e0b;font-weight:600;font-family:'SF Mono',monospace;word-break:break-all}
.param .val{color:#ccc;font-family:'SF Mono',monospace;word-break:break-all;text-align:right}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/urlencoder/">
<meta property="og:url" content="https://tinytools.store/urlencoder/">

<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style id="tt-ds">
:root{--bg:#e8e6df!important;--surface:#f3f1ea!important;--surface2:#fbfaf6!important;--border:rgba(22,19,15,.13)!important;--border2:rgba(22,19,15,.22)!important;--accent:#d6451f!important;--accent2:#d6451f!important;--text:#16130f!important;--text2:#5b564d!important;--muted:#9c958a!important;--code-bg:#fbfaf6!important;--tt-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace}
body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}
.ttbar{position:fixed;top:0;left:0;right:0;width:100%;z-index:99999;display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 1.3rem;background:rgba(232,230,223,.82);backdrop-filter:blur(16px) saturate(130%);border-bottom:1px solid rgba(22,19,15,.13);box-sizing:border-box}
.ttbar .l{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;color:#16130f;text-decoration:none}
.ttbar .l svg{width:17px;height:17px;color:#d6451f;stroke-width:2.2}
.ttbar .b{display:inline-flex;align-items:center;gap:.45rem;font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#16130f;text-decoration:none}
.ttbar .b svg{width:18px;height:18px;color:#d6451f;stroke-width:1.8}
.ttbar .t{font-family:var(--tt-mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c958a;border:1px solid rgba(22,19,15,.22);border-radius:5px;padding:.18rem .45rem}
@media(max-width:560px){.ttbar .t{display:none}}
</style>
</head>
<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>🔗 URL Encoder / Decoder</h1>
<label>Input</label>
<textarea id="input" placeholder="Paste a URL or text to encode/decode...">https://example.com/search?q=hello world&lang=en&page=1</textarea>
<div class="mode">
<div class="mode-btn active" onclick="setMode('full',this)">Full URL</div>
<div class="mode-btn" onclick="setMode('component',this)">Component Only</div>
<div class="mode-btn" onclick="setMode('base64',this)">Base64</div>
</div>
<div class="btns">
<button class="btn btn-encode" onclick="encode()">→ Encode</button>
<button class="btn btn-decode" onclick="decode()">← Decode</button>
</div>
<label>Output</label>
<textarea id="output" readonly></textarea>
<div style="display:flex;gap:.4rem;margin-top:.5rem">
<button class="btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('output').value)">📋 Copy</button>
<button class="btn-sm" onclick="document.getElementById('input').value=document.getElementById('output').value;document.getElementById('output').value=''">↕️ Swap</button>
<button class="btn-sm" onclick="parseUrl()">🔍 Parse URL</button>
</div>
<div class="parsed" id="parsed"><h3>URL Parameters</h3><div id="params"></div></div>
</main>
<script>
let mode='full';
function setMode(m,el){mode=m;document.querySelectorAll('.mode-btn').forEach(e=>e.classList.remove('active'));el.classList.add('active')}

function encode(){
  const v=document.getElementById('input').value;
  if(mode==='component')document.getElementById('output').value=encodeURIComponent(v);
  else if(mode==='base64')document.getElementById('output').value=btoa(unescape(encodeURIComponent(v)));
  else document.getElementById('output').value=encodeURI(v);
}

function decode(){
  const v=document.getElementById('input').value;
  try{
    if(mode==='component')document.getElementById('output').value=decodeURIComponent(v);
    else if(mode==='base64')document.getElementById('output').value=decodeURIComponent(escape(atob(v)));
    else document.getElementById('output').value=decodeURI(v);
  }catch(e){document.getElementById('output').value='Error: '+e.message}
}

function parseUrl(){
  const v=document.getElementById('input').value||document.getElementById('output').value;
  try{
    const url=new URL(v);
    const params=[
      ['Protocol',url.protocol],['Host',url.host],['Path',url.pathname],
      ['Hash',url.hash||'(none)']
    ];
    url.searchParams.forEach((val,key)=>params.push([key,val]));
    document.getElementById('params').innerHTML=params.map(([k,v])=>
      `<div class="param"><span class="key">${k}</span><span class="val">${v}</span></div>`
    ).join('');
    document.getElementById('parsed').style.display='block';
  }catch(e){
    document.getElementById('params').innerHTML=`<div class="param"><span class="key">Error</span><span class="val">${e.message}</span></div>`;
    document.getElementById('parsed').style.display='block';
  }
}
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
</html>
