<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Encode & Decode URLs Free Online</title>
<meta name="description" content="Encode and decode URLs. Handle special characters, query strings, Unicode. Free URL encoder and decoder tool.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a0a;min-height:100vh;color:#fff}main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
textarea{width:100%;height:120px;padding:.7rem;background:#111;border:1px solid #222;border-radius:10px;color:#fff;font-family:'SF Mono',monospace;font-size:.82rem;resize:vertical;outline:none;line-height:1.5}
textarea:focus{border-color:#f59e0b}
label{display:block;font-size:.62rem;text-transform:uppercase;color:#888;font-weight:600;margin-bottom:.3rem;margin-top:1rem}
.btns{display:flex;gap:.5rem;margin:1rem 0;flex-wrap:wrap}
.btn{flex:1;padding:.5rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;color:#fff}
.btn-encode{background:#f59e0b;color:#000}.btn-decode{background:#8b5cf6}
.btn-sm{background:#222;color:#ccc;padding:.35rem .6rem;font-size:.72rem;border-radius:6px;cursor:pointer;border:none}
.mode{display:flex;gap:.3rem;margin:.8rem 0}
.mode-btn{padding:.3rem .6rem;border-radius:5px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid #333;color:#888;background:#1a1a1a}
.mode-btn.active{border-color:#f59e0b;color:#f59e0b}
.parsed{background:#111;border:1px solid #222;border-radius:10px;padding:1rem;margin-top:1rem;display:none}
.parsed h3{font-size:.65rem;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:.5rem}
.param{display:flex;justify-content:space-between;font-size:.75rem;padding:.3rem .4rem;background:#1a1a1a;border-radius:4px;margin-bottom:.2rem;gap:.5rem}
.param .key{color:#f59e0b;font-weight:600;font-family:'SF Mono',monospace;word-break:break-all}
.param .val{color:#ccc;font-family:'SF Mono',monospace;word-break:break-all;text-align:right}
</style>
</head>
<body style="padding-top:48px"><div style="position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)"><a href="/" style="display:flex;align-items:center;gap:.4rem;text-decoration:none;font-size:.82rem;font-weight:700;color:#a78bfa">← Back</a><a href="/" style="display:flex;align-items:center;gap:.3rem;text-decoration:none;font-size:.82rem;font-weight:800;color:#e0e0e0">🛠️ TinyTools</a></div>
<style>
.tt-nav{position:sticky;top:0;z-index:999;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1c1c1c;padding:0 1rem;font-family:'Inter',system-ui,sans-serif}
.tt-nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}
.tt-nav a{text-decoration:none;color:#ededed;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem;transition:opacity .15s}
.tt-nav a:hover{opacity:.7}
.tt-nav .tt-logo{font-size:.72rem;font-weight:800;letter-spacing:-.02em}
.tt-nav .tt-logo span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tt-nav .tt-back{color:#a0a0a0;font-size:.68rem}
</style>
<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>

<main>
<h1>🔗 URL Encoder / Decoder</h1>
<label>Input</label>
<textarea id="input" placeholder="Paste a URL or text to encode/decode...">https://example.com/search?q=hello world&lang=en&page=1</textarea>
<div class="mode">
<div class="mode-btn active" onclick="setMode('full',this)">Full URL</div>
<div class="mode-btn" onclick="setMode('component',this)">Component Only</div>
<div class="mode-btn" onclick="setMode('base64',this)">Base64</div>
</div>
<div class="btns">
<button class="btn btn-encode" onclick="encode()">→ Encode</button>
<button class="btn btn-decode" onclick="decode()">← Decode</button>
</div>
<label>Output</label>
<textarea id="output" readonly></textarea>
<div style="display:flex;gap:.4rem;margin-top:.5rem">
<button class="btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('output').value)">📋 Copy</button>
<button class="btn-sm" onclick="document.getElementById('input').value=document.getElementById('output').value;document.getElementById('output').value=''">↕️ Swap</button>
<button class="btn-sm" onclick="parseUrl()">🔍 Parse URL</button>
</div>
<div class="parsed" id="parsed"><h3>URL Parameters</h3><div id="params"></div></div>
</main>
<script>
let mode='full';
function setMode(m,el){mode=m;document.querySelectorAll('.mode-btn').forEach(e=>e.classList.remove('active'));el.classList.add('active')}

function encode(){
  const v=document.getElementById('input').value;
  if(mode==='component')document.getElementById('output').value=encodeURIComponent(v);
  else if(mode==='base64')document.getElementById('output').value=btoa(unescape(encodeURIComponent(v)));
  else document.getElementById('output').value=encodeURI(v);
}

function decode(){
  const v=document.getElementById('input').value;
  try{
    if(mode==='component')document.getElementById('output').value=decodeURIComponent(v);
    else if(mode==='base64')document.getElementById('output').value=decodeURIComponent(escape(atob(v)));
    else document.getElementById('output').value=decodeURI(v);
  }catch(e){document.getElementById('output').value='Error: '+e.message}
}

function parseUrl(){
  const v=document.getElementById('input').value||document.getElementById('output').value;
  try{
    const url=new URL(v);
    const params=[
      ['Protocol',url.protocol],['Host',url.host],['Path',url.pathname],
      ['Hash',url.hash||'(none)']
    ];
    url.searchParams.forEach((val,key)=>params.push([key,val]));
    document.getElementById('params').innerHTML=params.map(([k,v])=>
      `<div class="param"><span class="key">${k}</span><span class="val">${v}</span></div>`
    ).join('');
    document.getElementById('parsed').style.display='block';
  }catch(e){
    document.getElementById('params').innerHTML=`<div class="param"><span class="key">Error</span><span class="val">${e.message}</span></div>`;
    document.getElementById('parsed').style.display='block';
  }
}
</script>
</body>
</html>
