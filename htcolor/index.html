<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailwind Color Finder — Find Nearest Tailwind CSS Color Class</title>
<meta name="description" content="Paste any hex or RGB color and find the nearest Tailwind CSS color class. Shows closest match with all shades. Free Tailwind color lookup.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--accent:#38bdf8;--text:#e2e8f0;--muted:#64748b}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;font-weight:800;margin-bottom:1.5rem}
.input-area{display:flex;gap:.5rem;margin-bottom:1.5rem}
.input-area input[type=text]{flex:1;padding:.6rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;font-family:'SF Mono',monospace;outline:none}
.input-area input[type=text]:focus{border-color:var(--accent)}
.input-area input[type=color]{width:50px;height:44px;border:none;border-radius:8px;cursor:pointer}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1rem}
.match-card h3{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.6rem;font-weight:700}
.match-preview{display:flex;gap:1rem;align-items:center;margin-bottom:.8rem}
.match-preview .swatch{width:60px;height:60px;border-radius:10px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.match-preview .info .name{font-size:1.1rem;font-weight:800;color:var(--accent)}
.match-preview .info .class{font-size:.82rem;font-family:'SF Mono',monospace;color:var(--text);margin-top:.2rem}
.match-preview .info .hex{font-size:.72rem;color:var(--muted);font-family:'SF Mono',monospace}
.shades{display:grid;grid-template-columns:repeat(11,1fr);gap:3px;margin-top:.5rem}
.shade{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.shade:hover{border-color:#fff}
.shade.active{border-color:var(--accent);transform:scale(1.1)}
.shade-label{text-align:center;font-size:.6rem;color:var(--muted);margin-top:.15rem}
.all-matches{display:flex;flex-direction:column;gap:.3rem}
.alt-match{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;background:rgba(0,0,0,.2);border-radius:6px;cursor:pointer;transition:background .15s}
.alt-match:hover{background:rgba(56,189,248,.08)}
.alt-match .sw{width:28px;height:28px;border-radius:5px;flex-shrink:0}
.alt-match .nm{font-size:.78rem;font-weight:600;flex:1}
.alt-match .dst{font-size:.68rem;color:var(--muted)}
</style>
</head>
<body>
<style>
.tt-nav{position:sticky;top:0;z-index:999;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1c1c1c;padding:0 1rem;font-family:'Inter',system-ui,sans-serif}
.tt-nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}
.tt-nav a{text-decoration:none;color:#ededed;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem;transition:opacity .15s}
.tt-nav a:hover{opacity:.7}
.tt-nav .tt-logo{font-size:.72rem;font-weight:800;letter-spacing:-.02em}
.tt-nav .tt-logo span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tt-nav .tt-back{color:#a0a0a0;font-size:.68rem}
</style>
<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>

<main>
<h1>Tailwind Color Finder</h1>
<div class="input-area">
<input type="text" id="input" placeholder="#3b82f6" value="#3b82f6" oninput="find()">
<input type="color" id="picker" value="#3b82f6" oninput="document.getElementById('input').value=this.value;find()">
</div>
<div id="result"></div>
</main>
<script>
const tw={slate:{50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617'},gray:{50:'#f9fafb',100:'#f3f4f6',200:'#e5e7eb',300:'#d1d5db',400:'#9ca3af',500:'#6b7280',600:'#4b5563',700:'#374151',800:'#1f2937',900:'#111827',950:'#030712'},zinc:{50:'#fafafa',100:'#f4f4f5',200:'#e4e4e7',300:'#d4d4d8',400:'#a1a1aa',500:'#71717a',600:'#52525b',700:'#3f3f46',800:'#27272a',900:'#18181b',950:'#09090b'},red:{50:'#fef2f2',100:'#fee2e2',200:'#fecaca',300:'#fca5a5',400:'#f87171',500:'#ef4444',600:'#dc2626',700:'#b91c1c',800:'#991b1b',900:'#7f1d1d',950:'#450a0a'},orange:{50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12',950:'#431407'},amber:{50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f',950:'#451a03'},yellow:{50:'#fefce8',100:'#fef9c3',200:'#fef08a',300:'#fde047',400:'#facc15',500:'#eab308',600:'#ca8a04',700:'#a16207',800:'#854d0e',900:'#713f12',950:'#422006'},lime:{50:'#f7fee7',100:'#ecfccb',200:'#d9f99d',300:'#bef264',400:'#a3e635',500:'#84cc16',600:'#65a30d',700:'#4d7c0f',800:'#3f6212',900:'#365314',950:'#1a2e05'},green:{50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16'},emerald:{50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b',950:'#022c22'},teal:{50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a',950:'#042f2e'},cyan:{50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63',950:'#083344'},sky:{50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e',950:'#082f49'},blue:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',950:'#172554'},indigo:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'},violet:{50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9',800:'#5b21b6',900:'#4c1d95',950:'#2e1065'},purple:{50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',400:'#c084fc',500:'#a855f7',600:'#9333ea',700:'#7e22ce',800:'#6b21a8',900:'#581c87',950:'#3b0764'},fuchsia:{50:'#fdf4ff',100:'#fae8ff',200:'#f5d0fe',300:'#f0abfc',400:'#e879f9',500:'#d946ef',600:'#c026d3',700:'#a21caf',800:'#86198f',900:'#701a75',950:'#4a044e'},pink:{50:'#fdf2f8',100:'#fce7f3',200:'#fbcfe8',300:'#f9a8d4',400:'#f472b6',500:'#ec4899',600:'#db2777',700:'#be185d',800:'#9d174d',900:'#831843',950:'#500724'},rose:{50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#f43f5e',600:'#e11d48',700:'#be123c',800:'#9f1239',900:'#881337',950:'#4c0519'}};

function hexToRgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}
function dist(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2)}
function textC(r,g,b){return(r*299+g*587+b*114)/1000>128?'#000':'#fff'}

function find(){
  let val=document.getElementById('input').value.trim();
  if(!val.startsWith('#')&&/^[0-9a-f]{3,6}$/i.test(val))val='#'+val;
  const rgb=hexToRgb(val);
  if(isNaN(rgb[0]))return;
  document.getElementById('picker').value=val.length===4?'#'+val[1]+val[1]+val[2]+val[2]+val[3]+val[3]:val;

  const matches=[];
  Object.entries(tw).forEach(([name,shades])=>{
    Object.entries(shades).forEach(([shade,hex])=>{
      const d=dist(rgb,hexToRgb(hex));
      matches.push({name,shade,hex,dist:d,class:`${name}-${shade}`});
    });
  });
  matches.sort((a,b)=>a.dist-b.dist);
  const best=matches[0];
  const tc=textC(...hexToRgb(best.hex));

  let html=`<div class="match-card"><h3>Best Match</h3><div class="match-preview"><div class="swatch" style="background:${best.hex}"></div><div class="info"><div class="name">${best.name}-${best.shade}</div><div class="class">bg-${best.class} / text-${best.class}</div><div class="hex">${best.hex} (Δ${best.dist.toFixed(1)})</div></div></div>`;
  
  // Show all shades of best match color
  const shades=tw[best.name];
  html+=`<div class="shades">`;
  Object.entries(shades).forEach(([s,h])=>{
    const tc2=textC(...hexToRgb(h));
    html+=`<div class="shade ${s===best.shade?'active':''}" style="background:${h};color:${tc2}" onclick="document.getElementById('input').value='${h}';find()" title="${best.name}-${s}: ${h}">${s}</div>`;
  });
  html+=`</div></div>`;

  // Top 5 alternatives
  html+=`<div class="match-card"><h3>Alternatives</h3><div class="all-matches">`;
  const seen=new Set();
  matches.slice(0,8).forEach(m=>{
    const key=m.name+m.shade;
    if(seen.has(key))return;seen.add(key);
    html+=`<div class="alt-match" onclick="document.getElementById('input').value='${m.hex}';find()"><div class="sw" style="background:${m.hex}"></div><div class="nm">${m.class}</div><div class="dst">${m.hex} · Δ${m.dist.toFixed(1)}</div></div>`;
  });
  html+=`</div></div>`;

  document.getElementById('result').innerHTML=html;
}
find();
</script>
</body>
</html>
