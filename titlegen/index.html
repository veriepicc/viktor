.field input,.field select{width:100%;padding:.5rem;background:#0f0f0f;border:1px solid rgba(22,19,15,.13);border-radius:6px;color:#fff;font-size:.85rem;outline:none;font-family:inherit}
.chips{display:flex;flex-wrap:wrap;gap:.3rem}
.chip{padding:.25rem .5rem;border-radius:5px;font-size:.65rem;font-weight:600;cursor:pointer;border:1px solid rgba(22,19,15,.13);color:#888;background:#0f0f0f}
.chip.active{border-color:#ff0000;color:#ff0000}

.titles{display:flex;flex-direction:column;gap:.3rem;margin-top:1rem}
.title{display:flex;align-items:center;justify-content:space-between;padding:.6rem .7rem;background:#181818;border:1px solid #272727;border-radius:8px;cursor:pointer;transition:all .15s}
.title:hover{border-color:#ff0000}
.title .text{font-size:.82rem;font-weight:600;flex:1}
.title .chars{font-size:.6rem;color:#666;margin-left:.5rem;white-space:nowrap}
.title .chars.warn{color:#f59e0b}

.score{display:inline-block;padding:.1rem .3rem;border-radius:3px;font-size:.55rem;font-weight:700;margin-left:.3rem}

<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>🎯 YouTube Title Generator</h1>
<div class="card">
<div class="field"><label>Your Topic</label><input type="text" id="topic" placeholder="e.g., minecraft survival, cooking pasta, python tutorial" value=""></div>
<div class="field"><label>Niche</label>
<div class="chips">
<div class="chip active" onclick="setNiche('gaming',this)">🎮 Gaming</div>
<div class="chip" onclick="setNiche('tech',this)">💻 Tech</div>
<div class="chip" onclick="setNiche('vlogs',this)">📹 Vlogs</div>
<div class="chip" onclick="setNiche('tutorial',this)">📚 Tutorial</div>
<div class="chip" onclick="setNiche('reaction',this)">😱 Reaction</div>
<div class="chip" onclick="setNiche('food',this)">🍕 Food</div>
<div class="chip" onclick="setNiche('fitness',this)">💪 Fitness</div>
</div></div>
</div>
<button class="btn" onclick="generate()">🎯 Generate Titles</button>
<div class="titles" id="titles"></div>
</main>
<script>
let niche='gaming';
function setNiche(n,el){niche=n;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active')}

const templates={
  gaming:[
    "I Tried {TOPIC} for 100 Days... Here's What Happened",
    "{TOPIC} but Every Death Makes It HARDER",
    "This {TOPIC} Strategy is BROKEN (don't tell anyone)",
    "I Spent 24 Hours Playing {TOPIC} and This Happened",
    "The {TOPIC} Video That YouTube Doesn't Want You to See",
    "{TOPIC} World Record Speedrun (INSANE)",
    "Why Everyone is WRONG About {TOPIC}",
    "I Beat {TOPIC} Using ONLY the Worst Item",
    "{TOPIC} in 2024 is Actually INSANE",
    "This {TOPIC} Trick Changes EVERYTHING",
    "I Let My Chat Control {TOPIC}... (disaster)",
    "Playing {TOPIC} Until I Win (no sleep challenge)",
  ],
  tech:[
    "I Built a {TOPIC} in 24 Hours",
    "{TOPIC} — Everything You Need to Know",
    "Why I Switched to {TOPIC} (and you should too)",
    "The TRUTH About {TOPIC} Nobody Tells You",
    "{TOPIC} Changed My Life. Here's Why.",
    "I Replaced Everything With {TOPIC} for a Week",
    "Stop Using {TOPIC} Wrong. Do THIS Instead.",
    "{TOPIC} vs The Competition — Honest Review",
    "The Hidden Feature in {TOPIC} Nobody Uses",
    "{TOPIC} Tutorial for Beginners (2024)",
    "How {TOPIC} Made Me $10,000",
    "I Tested {TOPIC} So You Don't Have To",
  ],
  vlogs:[
    "A Day in My Life with {TOPIC}",
    "I Tried {TOPIC} for the First Time...",
    "Moving to {TOPIC} Changed Everything",
    "What Really Happened with {TOPIC}",
    "I Can't Believe {TOPIC} Actually Worked",
    "Reacting to My Old {TOPIC} Videos",
    "The Truth About My {TOPIC} Journey",
    "24 Hours of {TOPIC} (gone wrong)",
    "Why I Quit {TOPIC}... (honest update)",
    "We Need to Talk About {TOPIC}",
  ],
  tutorial:[
    "{TOPIC} — Complete Beginner's Guide (2024)",
    "Learn {TOPIC} in 10 Minutes",
    "{TOPIC} Tutorial — Zero to Hero",
    "The ONLY {TOPIC} Tutorial You'll Ever Need",
    "5 {TOPIC} Mistakes Every Beginner Makes",
    "{TOPIC} Tips That Took Me YEARS to Learn",
    "Master {TOPIC} in One Video",
    "{TOPIC} Crash Course — Everything Explained",
    "How to {TOPIC} the RIGHT Way",
    "Advanced {TOPIC} Techniques Nobody Teaches",
  ],
  reaction:[
    "Reacting to {TOPIC} for the FIRST TIME",
    "This {TOPIC} Left Me SPEECHLESS...",
    "I Was NOT Ready for {TOPIC}",
    "My Honest Reaction to {TOPIC}",
    "{TOPIC} — Is It Really THAT Good?!",
    "Watching {TOPIC} So You Don't Have To",
    "I Can't Believe {TOPIC} is Real...",
    "{TOPIC} Made Me Cry (not clickbait)",
  ],
  food:[
    "Making {TOPIC} for the First Time",
    "I Tried Making {TOPIC} and This Happened",
    "Gordon Ramsay Would CRY at My {TOPIC}",
    "The Perfect {TOPIC} Recipe (better than restaurant)",
    "{TOPIC} but I Only Have $10",
    "Rating {TOPIC} from Every Restaurant in My City",
    "I Only Ate {TOPIC} for 24 Hours",
    "Making {TOPIC} Using Only Dollar Store Ingredients",
  ],
  fitness:[
    "I Did {TOPIC} Every Day for 30 Days (results)",
    "{TOPIC} Transformation — Before & After",
    "The {TOPIC} Workout That Changed My Body",
    "Why {TOPIC} is Better Than You Think",
    "I Tried {TOPIC} for a Week — Honest Results",
    "{TOPIC} Mistakes That Are Killing Your Gains",
    "The Science Behind {TOPIC} (explained)",
    "30 Day {TOPIC} Challenge — Was It Worth It?",
  ]
};

function generate(){
  const topic=document.getElementById('topic').value.trim()||'this';
  const t=templates[niche]||templates.gaming;
  
  const titles=t.map(tmpl=>{
    const title=tmpl.replace(/\{TOPIC\}/g,topic);
    return title;
  }).sort(()=>Math.random()-.5).slice(0,10);
  
  document.getElementById('titles').innerHTML=titles.map(title=>{
    const len=title.length;
    const charClass=len>70?'bad':len>55?'warn':'chars';
    const ctr=len<40?'low':len>70?'low':len<55?'high':'mid';
    return `<div class="title" onclick="navigator.clipboard.writeText('${title.replace(/'/g,"\\'")}')">
      <span class="text">${title}<span class="score ${ctr}">${ctr==='high'?'🔥 HIGH CTR':ctr==='mid'?'⚡ OK':'⚠️ TOO LONG'}</span></span>
      <span class="${charClass}">${len}/70</span>
    </div>`;
  }).join('');
}
generate();
</script>
