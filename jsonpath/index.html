<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Path Finder — Navigate & Query JSON Data Online</title>
<meta name="description" content="Explore JSON data visually. Click any value to get its path. Query with JSONPath expressions. Free JSON path finder.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
main{max-width:850px;margin:0 auto;padding:1.5rem}
h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:1rem;color:#7dd3fc}
.split{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
@media(max-width:650px){.split{grid-template-columns:1fr}}
.pane{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden}
.pane-head{padding:.4rem .7rem;border-bottom:1px solid #30363d;font-size:.65rem;color:#8b949e;font-weight:600;display:flex;justify-content:space-between}
.pane-head button{background:#7dd3fc;color:#000;border:none;padding:.2rem .5rem;border-radius:4px;font-size:.6rem;font-weight:700;cursor:pointer}
.pane textarea{width:100%;min-height:350px;padding:.6rem;background:transparent;border:none;color:#c9d1d9;font-size:.75rem;font-family:'SF Mono',monospace;outline:none;resize:vertical;line-height:1.6}
.tree-pane{max-height:400px;overflow:auto;padding:.5rem}
.path-bar{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:.5rem .7rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.path-bar input{flex:1;background:transparent;border:none;color:#7dd3fc;font-family:'SF Mono',monospace;font-size:.8rem;font-weight:700;outline:none}
.path-bar button{background:#30363d;color:#c9d1d9;border:none;padding:.2rem .5rem;border-radius:4px;font-size:.6rem;cursor:pointer}
.tree-node{margin-left:1rem;font-size:.75rem;font-family:'SF Mono',monospace}
.tree-key{color:#79c0ff;cursor:pointer}
.tree-key:hover{text-decoration:underline}
.tree-str{color:#a5d6ff}
.tree-num{color:#79c0ff}
.tree-bool{color:#ff7b72}
.tree-null{color:#8b949e}
.tree-toggle{cursor:pointer;color:#8b949e;user-select:none;display:inline-block;width:1em}
.tree-bracket{color:#8b949e}
.collapsed .tree-children{display:none}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/jsonpath/">
<meta property="og:url" content="https://tinytools.store/jsonpath/">

<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style id="tt-ds">
:root{--bg:#e8e6df!important;--surface:#f3f1ea!important;--surface2:#fbfaf6!important;--border:rgba(22,19,15,.13)!important;--border2:rgba(22,19,15,.22)!important;--accent:#d6451f!important;--accent2:#d6451f!important;--text:#16130f!important;--text2:#5b564d!important;--muted:#9c958a!important;--code-bg:#fbfaf6!important;--tt-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace}
body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}
.ttbar{position:fixed;top:0;left:0;right:0;width:100%;z-index:99999;display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 1.3rem;background:rgba(232,230,223,.82);backdrop-filter:blur(16px) saturate(130%);border-bottom:1px solid rgba(22,19,15,.13);box-sizing:border-box}
.ttbar .l{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;color:#16130f;text-decoration:none}
.ttbar .l svg{width:17px;height:17px;color:#d6451f;stroke-width:2.2}
.ttbar .b{display:inline-flex;align-items:center;gap:.45rem;font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#16130f;text-decoration:none}
.ttbar .b svg{width:18px;height:18px;color:#d6451f;stroke-width:1.8}
.ttbar .t{font-family:var(--tt-mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c958a;border:1px solid rgba(22,19,15,.22);border-radius:5px;padding:.18rem .45rem}
@media(max-width:560px){.ttbar .t{display:none}}
</style>
</head>
<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>🗺️ JSON Path Finder</h1>
<div class="path-bar"><span style="color:#8b949e;font-size:.7rem">Path:</span><input type="text" id="pathDisplay" value="$" readonly><button onclick="navigator.clipboard.writeText(document.getElementById('pathDisplay').value)">Copy</button></div>
<div class="split">
<div class="pane"><div class="pane-head"><span>JSON Input</span><button onclick="loadSample()">Sample</button></div><textarea id="input" placeholder="Paste JSON..." oninput="parse()">{
  "users": [
    {
      "id": 1,
      "name": "Alice",
      "email": "alice@example.com",
      "roles": ["admin", "user"],
      "settings": {
        "theme": "dark",
        "notifications": true
      }
    },
    {
      "id": 2,
      "name": "Bob",
      "email": "bob@example.com",
      "roles": ["user"],
      "settings": {
        "theme": "light",
        "notifications": false
      }
    }
  ],
  "meta": {
    "total": 2,
    "page": 1,
    "version": "2.0"
  }
}</textarea></div>
<div class="pane"><div class="pane-head"><span>Tree Explorer — click any value</span></div><div class="tree-pane" id="tree"></div></div>
</div>
</main>
<script>
function parse(){
  try{
    const data=JSON.parse(document.getElementById('input').value);
    document.getElementById('tree').innerHTML=renderNode(data,'$');
  }catch(e){
    document.getElementById('tree').innerHTML=`<div style="color:#ff7b72;padding:.5rem">⚠️ ${e.message}</div>`;
  }
}

function renderNode(val,path,key){
  if(val===null)return `<span class="tree-null" onclick="setPath('${path}')" title="${path}">null</span>`;
  if(typeof val==='boolean')return `<span class="tree-bool" onclick="setPath('${path}')" title="${path}">${val}</span>`;
  if(typeof val==='number')return `<span class="tree-num" onclick="setPath('${path}')" title="${path}">${val}</span>`;
  if(typeof val==='string')return `<span class="tree-str" onclick="setPath('${path}')" title="${path}">"${escHtml(val)}"</span>`;
  
  if(Array.isArray(val)){
    if(val.length===0)return '<span class="tree-bracket">[]</span>';
    let html='<div class="tree-node"><span class="tree-toggle" onclick="this.parentElement.classList.toggle(\'collapsed\')">▼</span><span class="tree-bracket">[</span><div class="tree-children">';
    val.forEach((item,i)=>{
      const p=path+'['+i+']';
      html+=`<div class="tree-node"><span class="tree-key" onclick="setPath('${p}')">${i}</span>: ${renderNode(item,p)}</div>`;
    });
    html+='</div><span class="tree-bracket">]</span></div>';
    return html;
  }
  
  if(typeof val==='object'){
    const keys=Object.keys(val);
    if(keys.length===0)return '<span class="tree-bracket">{}</span>';
    let html='<div class="tree-node"><span class="tree-toggle" onclick="this.parentElement.classList.toggle(\'collapsed\')">▼</span><span class="tree-bracket">{</span><div class="tree-children">';
    keys.forEach(k=>{
      const p=path+'.'+k;
      html+=`<div class="tree-node"><span class="tree-key" onclick="setPath('${p}')">"${escHtml(k)}"</span>: ${renderNode(val[k],p)}</div>`;
    });
    html+='</div><span class="tree-bracket">}</span></div>';
    return html;
  }
  
  return String(val);
}

function setPath(p){document.getElementById('pathDisplay').value=p}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function loadSample(){document.getElementById('input').value=JSON.stringify({"store":{"books":[{"title":"The Great Gatsby","author":"F. Scott Fitzgerald","price":12.99,"isbn":"978-0743273565"},{"title":"1984","author":"George Orwell","price":9.99,"isbn":"978-0451524935"}],"location":{"city":"New York","zip":"10001"}},"timestamp":"2024-01-15T10:30:00Z"},null,2);parse()}
parse();
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
</html>
