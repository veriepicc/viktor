<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator — Random Color Schemes & Palettes Free</title>
<meta name="description" content="Generate beautiful color palettes. Random, complementary, analogous, triadic. Export as CSS, Tailwind, JSON. Free palette generator.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#e8e6df;min-height:100vh;color:#16130f}main{max-width:700px;margin:0 auto;padding:2rem 1.5rem}h1{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:.5rem}
.sub{text-align:center;font-size:.75rem;color:#888;margin-bottom:1.5rem}
.palette{display:flex;border-radius:14px;overflow:hidden;height:220px;margin-bottom:1rem;border:1px solid #f3f1ea}
.swatch{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:1rem;cursor:pointer;transition:flex .3s}
.swatch:hover{flex:1.3}
.swatch .hex{font-size:.72rem;font-weight:700;background:rgba(0,0,0,.4);padding:.2rem .5rem;border-radius:4px;backdrop-filter:blur(4px)}
.swatch .lock{font-size:.8rem;margin-top:.3rem;opacity:.4}.swatch .lock:hover{opacity:1}
.swatch.locked .lock{opacity:1}
.controls{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;justify-content:center}
.btn{padding:.45rem .8rem;border-radius:7px;font-size:.78rem;font-weight:700;cursor:pointer;border:none;color:#16130f}
.btn-main{background:#d6451f;font-size:.9rem;padding:.55rem 1.5rem}
.btn-sm{background:#f3f1ea;color:#ccc;font-size:.7rem}
.export{background:#e8e6df;border:1px solid #f3f1ea;border-radius:10px;padding:.8rem;margin-top:1rem}
.export h3{font-size:.6rem;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:.4rem}
.export-row{display:flex;gap:.3rem;margin-bottom:.5rem;flex-wrap:wrap}
.export-btn{padding:.25rem .5rem;border-radius:4px;font-size:.6rem;font-weight:600;cursor:pointer;border:1px solid rgba(22,19,15,.13);color:#888;background:#e8e6df}
.export-btn.active{border-color:#d6451f;color:#d6451f}
.export code{display:block;background:#e8e6df;border:1px solid rgba(22,19,15,.13);border-radius:6px;padding:.5rem;font-size:.7rem;color:#a5f3fc;cursor:pointer;white-space:pre;overflow-x:auto}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/colorpalette/">
<meta property="og:url" content="https://tinytools.store/colorpalette/">

<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style id="tt-ds">
:root{--bg:#e8e6df!important;--surface:#f3f1ea!important;--surface2:#fbfaf6!important;--border:rgba(22,19,15,.13)!important;--border2:rgba(22,19,15,.22)!important;--accent:#d6451f!important;--accent2:#d6451f!important;--text:#16130f!important;--text2:#5b564d!important;--muted:#9c958a!important;--code-bg:#fbfaf6!important;--tt-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace}
body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}
.ttbar{position:fixed;top:0;left:0;right:0;width:100%;z-index:99999;display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 1.3rem;background:rgba(232,230,223,.82);backdrop-filter:blur(16px) saturate(130%);border-bottom:1px solid rgba(22,19,15,.13);box-sizing:border-box}
.ttbar .l{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;color:#16130f;text-decoration:none}
.ttbar .l svg{width:17px;height:17px;color:#d6451f;stroke-width:2.2}
.ttbar .b{display:inline-flex;align-items:center;gap:.45rem;font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#16130f;text-decoration:none}
.ttbar .b svg{width:18px;height:18px;color:#d6451f;stroke-width:1.8}
.ttbar .t{font-family:var(--tt-mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c958a;border:1px solid rgba(22,19,15,.22);border-radius:5px;padding:.18rem .45rem}
@media(max-width:560px){.ttbar .t{display:none}}
</style>
</head>
<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>🎨 Color Palette Generator</h1>
<p class="sub">Press <kbd style="background:#222;padding:1px 5px;border-radius:3px;font-size:.7rem">Space</kbd> to generate · Click color to copy · 🔒 to lock</p>
<div class="palette" id="palette"></div>
<div class="controls">
<button class="btn btn-main" onclick="generate()">⚡ Generate</button>
<button class="btn btn-sm" onclick="setMode('random')">Random</button>
<button class="btn btn-sm" onclick="setMode('warm')">🔥 Warm</button>
<button class="btn btn-sm" onclick="setMode('cool')">❄️ Cool</button>
<button class="btn btn-sm" onclick="setMode('pastel')">🌸 Pastel</button>
<button class="btn btn-sm" onclick="setMode('neon')">⚡ Neon</button>
<button class="btn btn-sm" onclick="setMode('dark')">🌑 Dark</button>
<button class="btn btn-sm" onclick="setMode('earth')">🌿 Earth</button>
</div>
<div class="export">
<h3>Export</h3>
<div class="export-row">
<div class="export-btn active" onclick="setExport('css',this)">CSS</div>
<div class="export-btn" onclick="setExport('tailwind',this)">Tailwind</div>
<div class="export-btn" onclick="setExport('scss',this)">SCSS</div>
<div class="export-btn" onclick="setExport('json',this)">JSON</div>
<div class="export-btn" onclick="setExport('array',this)">Array</div>
</div>
<code id="exportCode" onclick="navigator.clipboard.writeText(this.textContent)"></code>
</div>
</main>
<script>
let colors=[],locked=[false,false,false,false,false],mode='random',exportFmt='css';
function hsl2hex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};return'#'+f(0)+f(8)+f(4)}
function textColor(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*.299+g*.587+b*.114)>150?'#000':'#fff'}

const modes={
  random:()=>hsl2hex(Math.random()*360|0,50+Math.random()*40|0,40+Math.random()*40|0),
  warm:()=>hsl2hex(Math.random()*60-10|0,60+Math.random()*30|0,45+Math.random()*30|0),
  cool:()=>hsl2hex(180+Math.random()*80|0,50+Math.random()*30|0,40+Math.random()*35|0),
  pastel:()=>hsl2hex(Math.random()*360|0,40+Math.random()*30|0,75+Math.random()*15|0),
  neon:()=>hsl2hex(Math.random()*360|0,90+Math.random()*10|0,55+Math.random()*10|0),
  dark:()=>hsl2hex(Math.random()*360|0,20+Math.random()*40|0,10+Math.random()*25|0),
  earth:()=>{const hues=[25,35,45,90,120,150];return hsl2hex(hues[Math.random()*hues.length|0]+Math.random()*15|0,30+Math.random()*30|0,30+Math.random()*35|0)}
};

function generate(){
  for(let i=0;i<5;i++){if(!locked[i])colors[i]=modes[mode]()}
  renderPalette();renderExport();
}
function setMode(m){mode=m;generate()}
function setExport(f,el){exportFmt=f;document.querySelectorAll('.export-btn').forEach(e=>e.classList.remove('active'));if(el)el.classList.add('active');renderExport()}

function renderPalette(){
  document.getElementById('palette').innerHTML=colors.map((c,i)=>`
    <div class="swatch ${locked[i]?'locked':''}" style="background:${c}" onclick="navigator.clipboard.writeText('${c}')">
      <span class="hex" style="color:${textColor(c)}">${c.toUpperCase()}</span>
      <span class="lock" onclick="event.stopPropagation();locked[${i}]=!locked[${i}];renderPalette()">${locked[i]?'🔒':'🔓'}</span>
    </div>
  `).join('');
}

function renderExport(){
  const names=['primary','secondary','accent','highlight','muted'];
  let code='';
  if(exportFmt==='css')code=`:root {\n${colors.map((c,i)=>`  --color-${names[i]}: ${c};`).join('\n')}\n}`;
  else if(exportFmt==='tailwind')code=`module.exports = {\n  theme: {\n    extend: {\n      colors: {\n${colors.map((c,i)=>`        '${names[i]}': '${c}',`).join('\n')}\n      }\n    }\n  }\n}`;
  else if(exportFmt==='scss')code=colors.map((c,i)=>`$color-${names[i]}: ${c};`).join('\n');
  else if(exportFmt==='json')code=JSON.stringify(Object.fromEntries(colors.map((c,i)=>[names[i],c])),null,2);
  else code=`[${colors.map(c=>`"${c}"`).join(', ')}]`;
  document.getElementById('exportCode').textContent=code;
}

document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'){e.preventDefault();generate()}});
generate();
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
</html>
