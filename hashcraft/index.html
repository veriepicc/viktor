<script>
const algos=['MD5','SHA-1','SHA-256','SHA-384','SHA-512'];
const grid=document.getElementById('hashGrid');
algos.forEach(a=>{const r=document.createElement('div');r.className='hash-row';r.innerHTML=`<div class="algo"><span>${a}</span><button onclick="copyHash('${a}')">Copy</button></div><div class="hash-val empty" id="h-${a}">Waiting for input...</div>`;grid.appendChild(r)});
const textInput=document.getElementById('textInput');
textInput.addEventListener('input',()=>hashText(textInput.value));
function switchTab(t){document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='text'?0:1)));document.getElementById('textInput').style.display=t==='text'?'':'none';document.getElementById('fileArea').className='file-area'+(t==='file'?' show':'');if(t==='text')hashText(textInput.value)}
document.getElementById('fileIn').onchange=async e=>{const f=e.target.files[0];if(!f)return;const buf=await f.arrayBuffer();hashBuffer(buf)};
async function hashText(txt){const enc=new TextEncoder().encode(txt);if(!txt){algos.forEach(a=>{const el=document.getElementById('h-'+a);el.textContent='Waiting for input...';el.className='hash-val empty'});return}hashBuffer(enc.buffer)}
async function hashBuffer(buf){for(const a of algos){const el=document.getElementById('h-'+a);if(a==='MD5'){el.textContent=md5(new Uint8Array(buf));el.className='hash-val'}else{const h=await crypto.subtle.digest(a,buf);el.textContent=Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');el.className='hash-val'}}}
function copyHash(a){const t=document.getElementById('h-'+a).textContent;if(t.startsWith('Waiting'))return;navigator.clipboard.writeText(t);const btn=document.querySelector(`#h-${a}`).parentElement.querySelector('button');btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1200)}
function md5(b){function f(a,c){return(a+c)|0}function r(n,s){return(n<<s)|(n>>>(32-s))}var x=[];for(var i=0;i<b.length;i+=4)x.push(b[i]|(b[i+1]<<8)|(b[i+2]<<16)|(b[i+3]<<24));var l=b.length*8;x[b.length>>2]|=128<<(b.length%4*8);x[(((b.length+8)>>>6)<<4)+14]=l;var a=1732584193,c=-271733879,d=-1732584194,e=271733878;var S=[7,12,17,22,5,9,14,20,4,11,16,23,6,10,15,21];var T=[];for(i=0;i<64;i++)T[i]=Math.floor(Math.abs(Math.sin(i+1))*4294967296);for(i=0;i<x.length;i+=16){var aa=a,bb=c,cc=d,dd=e;for(var j=0;j<64;j++){var g,k;if(j<16){g=(c&d)|((~c)&e);k=j}else if(j<32){g=(e&c)|((~e)&d);k=(5*j+1)%16}else if(j<48){g=c^d^e;k=(3*j+5)%16}else{g=d^(c|(~e));k=(7*j)%16}var t=e;e=d;d=c;c=f(c,r(f(f(a,g),f(T[j],x[i+k])),S[(j>>4)*4+(j%4)]));a=t}a=f(a,aa);c=f(c,bb);d=f(d,cc);e=f(e,dd)}var o='';[a,c,d,e].forEach(v=>{for(var i=0;i<4;i++)o+=((v>>(i*8))&255).toString(16).padStart(2,'0')});return o}
</script>
