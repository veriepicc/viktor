<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro — Focus Timer (25/5 Pomodoro Technique)</title>
<meta name="description" content="Pomodoro timer for focused work sessions. 25 min work, 5 min break. Customizable. Free online focus timer.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0f0f0f;color:#e5e5e5;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
.container{text-align:center;max-width:400px;padding:2rem}
.modes{display:flex;gap:.3rem;margin-bottom:2rem;justify-content:center}
.mode{padding:.5rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;color:#737373;background:#e8e6df;transition:all .15s}
.mode.active{background:#ef4444;color:#16130f}
.timer-ring{position:relative;width:280px;height:280px;margin:0 auto 2rem}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:6}
.bg-ring{stroke:#e8e6df}
.progress-ring{stroke:#ef4444;stroke-linecap:round;transition:stroke-dashoffset .5s}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.time-display{font-size:4rem;font-weight:900;font-family:'SF Mono',monospace;letter-spacing:.02em}
.session-label{font-size:.82rem;color:#737373;margin-top:.3rem}
.controls{display:flex;gap:.5rem;justify-content:center;margin-bottom:2rem}
.ctrl-btn{padding:.6rem 2rem;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;border:none;transition:opacity .15s}
.ctrl-btn:hover{opacity:.85}
.start-btn{background:#ef4444;color:#16130f}
.reset-btn{background:#e8e6df;color:#737373}
.stats{display:flex;gap:1rem;justify-content:center}
.stat{text-align:center}
.stat .num{font-size:1.5rem;font-weight:800;color:#ef4444;font-family:'SF Mono',monospace}
.stat .label{font-size:.65rem;color:#737373;text-transform:uppercase;letter-spacing:.05em}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/pomodoro/">
<meta property="og:url" content="https://tinytools.store/pomodoro/">

<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style id="tt-ds">
:root{--bg:#e8e6df!important;--surface:#f3f1ea!important;--surface2:#fbfaf6!important;--border:rgba(22,19,15,.13)!important;--border2:rgba(22,19,15,.22)!important;--accent:#d6451f!important;--accent2:#d6451f!important;--text:#16130f!important;--text2:#5b564d!important;--muted:#9c958a!important;--code-bg:#fbfaf6!important;--tt-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace}
body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}
.ttbar{position:fixed;top:0;left:0;right:0;width:100%;z-index:99999;display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 1.3rem;background:rgba(232,230,223,.82);backdrop-filter:blur(16px) saturate(130%);border-bottom:1px solid rgba(22,19,15,.13);box-sizing:border-box}
.ttbar .l{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;color:#16130f;text-decoration:none}
.ttbar .l svg{width:17px;height:17px;color:#d6451f;stroke-width:2.2}
.ttbar .b{display:inline-flex;align-items:center;gap:.45rem;font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#16130f;text-decoration:none}
.ttbar .b svg{width:18px;height:18px;color:#d6451f;stroke-width:1.8}
.ttbar .t{font-family:var(--tt-mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c958a;border:1px solid rgba(22,19,15,.22);border-radius:5px;padding:.18rem .45rem}
@media(max-width:560px){.ttbar .t{display:none}}
</style>
</head>
<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<div class="container">
<div class="modes">
<button class="mode active" onclick="setMode(25,'Focus',this)">Focus</button>
<button class="mode" onclick="setMode(5,'Short Break',this)">Short Break</button>
<button class="mode" onclick="setMode(15,'Long Break',this)">Long Break</button>
</div>
<div class="timer-ring">
<svg width="280" height="280"><circle class="bg-ring" cx="140" cy="140" r="130"/><circle class="progress-ring" id="ring" cx="140" cy="140" r="130" stroke-dasharray="816.8" stroke-dashoffset="0"/></svg>
<div class="timer-text"><div class="time-display" id="time">25:00</div><div class="session-label" id="label">Focus</div></div>
</div>
<div class="controls">
<button class="ctrl-btn start-btn" id="startBtn" onclick="toggle()">Start</button>
<button class="ctrl-btn reset-btn" onclick="reset()">Reset</button>
</div>
<div class="stats">
<div class="stat"><div class="num" id="sessions">0</div><div class="label">Sessions</div></div>
<div class="stat"><div class="num" id="totalMin">0</div><div class="label">Minutes</div></div>
</div>
</div>
<script>
let duration=25*60,remaining=25*60,running=false,interval=null,sessions=0,totalSec=0,modeLabel='Focus';
const circ=2*Math.PI*130;
function setMode(min,label,el){
  stop();duration=min*60;remaining=min*60;modeLabel=label;
  document.querySelectorAll('.mode').forEach(m=>m.classList.remove('active'));el.classList.add('active');
  render();
}
function render(){
  const m=Math.floor(remaining/60),s=remaining%60;
  document.getElementById('time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('label').textContent=modeLabel;
  const pct=1-remaining/duration;
  document.getElementById('ring').style.strokeDashoffset=circ*(1-pct);
  document.title=document.getElementById('time').textContent+' — '+modeLabel;
}
function toggle(){running?stop():start()}
function start(){running=true;document.getElementById('startBtn').textContent='Pause';interval=setInterval(()=>{if(remaining<=0){stop();sessions++;totalSec+=duration;document.getElementById('sessions').textContent=sessions;document.getElementById('totalMin').textContent=Math.round(totalSec/60);try{new Audio('data:audio/wav;base64,UklGRl9vT19teleHIyaGVhZAAAAAMAAABAmAAAeHhhdA==').play()}catch(e){}return}remaining--;render()},1000)}
function stop(){running=false;clearInterval(interval);document.getElementById('startBtn').textContent='Start'}
function reset(){stop();remaining=duration;render()}
render();
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
</html>
