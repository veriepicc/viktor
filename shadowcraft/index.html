<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#151515;--border:#262626;--accent:#f472b6;--text:#e5e5e5;--muted:#737373}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{padding:.8rem 2rem;border-bottom:1px solid var(--border)}
.logo{font-size:1.2rem;font-weight:800}.logo span{color:var(--accent)}
main{max-width:800px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;font-weight:800;margin-bottom:2rem;text-align:center}
.preview-area{display:flex;justify-content:center;align-items:center;padding:3rem;background:repeating-conic-gradient(#1a1a1a 0% 25%,#151515 0% 50%) 50%/20px 20px;border-radius:14px;margin-bottom:2rem;min-height:250px}
.preview-box{width:200px;height:200px;background:#fff;border-radius:16px;transition:box-shadow .15s}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.control{display:flex;flex-direction:column;gap:.3rem}
.control label{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.control input[type=range]{accent-color:var(--accent)}
.control .val{font-size:.72rem;color:var(--accent);font-family:'SF Mono',monospace;text-align:right}
.row{display:flex;gap:1rem;align-items:end}
.row .control{flex:1}
.color-input{display:flex;gap:.4rem;align-items:center}
.color-input input[type=color]{width:36px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:1px}
.color-input input[type=text]{flex:1;padding:.3rem .5rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'SF Mono',monospace;font-size:.78rem;outline:none}
.checkbox{display:flex;align-items:center;gap:.4rem;font-size:.82rem;cursor:pointer;margin-bottom:1rem}
.checkbox input{accent-color:var(--accent)}
.output{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;font-family:'SF Mono',monospace;font-size:.82rem;color:var(--accent);word-break:break-all;cursor:pointer;position:relative}
.output:hover::after{content:'Click to copy';position:absolute;top:.3rem;right:.5rem;font-size:.65rem;color:var(--muted);font-family:'Inter',sans-serif}
.layers{margin-bottom:1.5rem}
.layers h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.5rem;font-weight:700}
.layer-btns{display:flex;gap:.3rem;margin-bottom:.8rem}
.layer-btn{padding:.3rem .7rem;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--surface)}
.layer-btn.active{border-color:var(--accent);color:var(--accent)}
.add-btn{background:none;border:1px dashed var(--border);color:var(--muted);padding:.3rem .7rem;border-radius:6px;font-size:.72rem;cursor:pointer}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--accent);color:#0a0a0a;padding:.5rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.72rem;margin-top:2rem}
</style>

<nav><div class="logo">Shadow<span>Craft</span></div></nav>
<main>
<h1>CSS Box Shadow Generator</h1>
<div class="preview-area"><div class="preview-box" id="previewBox"></div></div>
<div class="layers">
<h3>Shadow Layers</h3>
<div class="layer-btns" id="layerBtns"></div>
</div>
<div class="controls" id="controls"></div>
<label class="checkbox"><input type="checkbox" id="inset" onchange="update()"> Inset shadow</label>
<div class="output" id="output" onclick="copyCSS()"></div>
</main>
<div class="toast" id="toast">Copied!</div>
<footer>&copy; 2026 ShadowCraft &mdash; CSS shadow generator.</footer>
<script>
let layers=[{x:0,y:8,blur:24,spread:-4,color:'#000000',opacity:40,inset:false}];
let currentLayer=0;

function renderLayerBtns(){
  const el=document.getElementById('layerBtns');
  el.innerHTML=layers.map((_,i)=>`<div class="layer-btn ${i===currentLayer?'active':''}" onclick="selectLayer(${i})">Layer ${i+1}</div>`).join('')+`<div class="add-btn" onclick="addLayer()">+ Add</div>`;
}

function selectLayer(i){currentLayer=i;renderLayerBtns();renderControls();update()}
function addLayer(){layers.push({x:4,y:4,blur:16,spread:0,color:'#000000',opacity:20,inset:false});currentLayer=layers.length-1;renderLayerBtns();renderControls();update()}

function renderControls(){
  const l=layers[currentLayer];
  document.getElementById('controls').innerHTML=`
  <div class="control"><label>X Offset</label><input type="range" min="-100" max="100" value="${l.x}" oninput="setProp('x',this.value)"><div class="val" id="vx">${l.x}px</div></div>
  <div class="control"><label>Y Offset</label><input type="range" min="-100" max="100" value="${l.y}" oninput="setProp('y',this.value)"><div class="val" id="vy">${l.y}px</div></div>
  <div class="control"><label>Blur</label><input type="range" min="0" max="200" value="${l.blur}" oninput="setProp('blur',this.value)"><div class="val" id="vblur">${l.blur}px</div></div>
  <div class="control"><label>Spread</label><input type="range" min="-100" max="100" value="${l.spread}" oninput="setProp('spread',this.value)"><div class="val" id="vspread">${l.spread}px</div></div>
  <div class="control"><label>Opacity</label><input type="range" min="0" max="100" value="${l.opacity}" oninput="setProp('opacity',this.value)"><div class="val" id="vopacity">${l.opacity}%</div></div>
  <div class="control"><label>Color</label><div class="color-input"><input type="color" value="${l.color}" oninput="setProp('color',this.value)"><input type="text" value="${l.color}" oninput="setProp('color',this.value)"></div></div>`;
  document.getElementById('inset').checked=l.inset;
}

function setProp(prop,val){
  if(prop==='color')layers[currentLayer][prop]=val;
  else layers[currentLayer][prop]=parseInt(val);
  const valEl=document.getElementById('v'+prop);
  if(valEl)valEl.textContent=val+(prop==='opacity'?'%':'px');
  update();
}

function update(){
  layers[currentLayer].inset=document.getElementById('inset').checked;
  const shadows=layers.map(l=>{
    const r=parseInt(l.color.slice(1,3),16),g=parseInt(l.color.slice(3,5),16),b=parseInt(l.color.slice(5,7),16);
    const a=(l.opacity/100).toFixed(2);
    return`${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px rgba(${r},${g},${b},${a})`;
  });
  const css=shadows.join(', ');
  document.getElementById('previewBox').style.boxShadow=css;
  document.getElementById('output').textContent=`box-shadow: ${css};`;
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1000);
}

renderLayerBtns();renderControls();update();
</script>
</body>
