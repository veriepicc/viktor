<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Playground — CSS Flexbox Generator with Live Preview</title>
<meta name="description" content="Learn CSS Flexbox visually. Interactive playground with live preview. Generate flexbox code. Free CSS flexbox generator.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#e8e6df;min-height:100vh;color:#16130f}main{max-width:700px;margin:0 auto;padding:1.5rem}h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:1rem}
.preview{width:100%;min-height:250px;background:#e8e6df;border:2px dashed rgba(22,19,15,.13);border-radius:12px;padding:12px;margin-bottom:1rem;display:flex}
.item{min-width:50px;min-height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:#16130f}
.item:nth-child(1){background:#d6451f}.item:nth-child(2){background:#ec4899}.item:nth-child(3){background:#f59e0b}
.item:nth-child(4){background:#10b981}.item:nth-child(5){background:#3b82f6}.item:nth-child(6){background:#ef4444}
.card{background:#e8e6df;border:1px solid #f3f1ea;border-radius:12px;padding:1rem;margin-bottom:.8rem}
.card h3{font-size:.6rem;text-transform:uppercase;color:#666;font-weight:700;margin-bottom:.5rem}
.props{display:flex;flex-wrap:wrap;gap:.5rem}
.prop{min-width:140px;flex:1}
.prop label{display:block;font-size:.58rem;color:#888;font-weight:600;margin-bottom:.2rem;text-transform:uppercase}
.prop select{width:100%;padding:.35rem;background:#e8e6df;border:1px solid rgba(22,19,15,.13);border-radius:5px;color:#16130f;font-size:.75rem;outline:none;font-family:inherit}
.prop input[type=range]{width:100%;accent-color:#d6451f}
.btn-row{display:flex;gap:.3rem;margin-bottom:.5rem}
.btn{padding:.35rem .6rem;border-radius:5px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid rgba(22,19,15,.13);color:#888;background:#e8e6df}
.btn:hover{border-color:#d6451f;color:#d6451f}
.code{background:#e8e6df;border:1px solid rgba(22,19,15,.13);border-radius:8px;padding:.7rem;font-family:'SF Mono',monospace;font-size:.7rem;color:#16130f;cursor:pointer;white-space:pre}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/flexbox/">
<meta property="og:url" content="https://tinytools.store/flexbox/">

<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style id="tt-ds">
:root{--bg:#e8e6df!important;--surface:#f3f1ea!important;--surface2:#fbfaf6!important;--border:rgba(22,19,15,.13)!important;--border2:rgba(22,19,15,.22)!important;--accent:#d6451f!important;--accent2:#d6451f!important;--text:#16130f!important;--text2:#5b564d!important;--muted:#9c958a!important;--code-bg:#fbfaf6!important;--tt-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace}
body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}
.ttbar{position:fixed;top:0;left:0;right:0;width:100%;z-index:99999;display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 1.3rem;background:rgba(232,230,223,.82);backdrop-filter:blur(16px) saturate(130%);border-bottom:1px solid rgba(22,19,15,.13);box-sizing:border-box}
.ttbar .l{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;color:#16130f;text-decoration:none}
.ttbar .l svg{width:17px;height:17px;color:#d6451f;stroke-width:2.2}
.ttbar .b{display:inline-flex;align-items:center;gap:.45rem;font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#16130f;text-decoration:none}
.ttbar .b svg{width:18px;height:18px;color:#d6451f;stroke-width:1.8}
.ttbar .t{font-family:var(--tt-mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c958a;border:1px solid rgba(22,19,15,.22);border-radius:5px;padding:.18rem .45rem}
@media(max-width:560px){.ttbar .t{display:none}}
</style>
</head>
<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>📦 Flexbox Playground</h1>
<div class="preview" id="preview"></div>
<div class="btn-row">
<button class="btn" onclick="addItem()">+ Add Item</button>
<button class="btn" onclick="removeItem()">- Remove Item</button>
<button class="btn" onclick="resetItems()">Reset</button>
</div>
<div class="card">
<h3>Container Properties</h3>
<div class="props">
<div class="prop"><label>flex-direction</label><select id="direction" onchange="render()"><option>row</option><option>row-reverse</option><option>column</option><option>column-reverse</option></select></div>
<div class="prop"><label>justify-content</label><select id="justify" onchange="render()"><option>flex-start</option><option>flex-end</option><option>center</option><option>space-between</option><option>space-around</option><option>space-evenly</option></select></div>
<div class="prop"><label>align-items</label><select id="align" onchange="render()"><option>stretch</option><option>flex-start</option><option>flex-end</option><option>center</option><option>baseline</option></select></div>
<div class="prop"><label>flex-wrap</label><select id="wrap" onchange="render()"><option>nowrap</option><option>wrap</option><option>wrap-reverse</option></select></div>
<div class="prop"><label>align-content</label><select id="alignContent" onchange="render()"><option>stretch</option><option>flex-start</option><option>flex-end</option><option>center</option><option>space-between</option><option>space-around</option></select></div>
<div class="prop"><label>gap</label><input type="range" id="gap" min="0" max="30" value="8" oninput="render()"></div>
</div>
</div>
<div class="code" id="code" onclick="navigator.clipboard.writeText(this.textContent)"></div>
</main>
<script>
let itemCount=4;
let itemSizes=[{w:80,h:80},{w:60,h:100},{w:100,h:60},{w:70,h:70}];

function addItem(){if(itemCount<8){itemCount++;itemSizes.push({w:50+Math.random()*60|0,h:50+Math.random()*60|0});render()}}
function removeItem(){if(itemCount>1){itemCount--;itemSizes.pop();render()}}
function resetItems(){itemCount=4;itemSizes=[{w:80,h:80},{w:60,h:100},{w:100,h:60},{w:70,h:70}];render()}

function render(){
  const preview=document.getElementById('preview');
  const dir=document.getElementById('direction').value;
  const just=document.getElementById('justify').value;
  const ali=document.getElementById('align').value;
  const wrap=document.getElementById('wrap').value;
  const ac=document.getElementById('alignContent').value;
  const gap=document.getElementById('gap').value;
  
  preview.style.flexDirection=dir;
  preview.style.justifyContent=just;
  preview.style.alignItems=ali;
  preview.style.flexWrap=wrap;
  preview.style.alignContent=ac;
  preview.style.gap=gap+'px';
  
  preview.innerHTML='';
  for(let i=0;i<itemCount;i++){
    const item=document.createElement('div');
    item.className='item';
    item.textContent=i+1;
    item.style.width=itemSizes[i].w+'px';
    item.style.height=itemSizes[i].h+'px';
    preview.appendChild(item);
  }
  
  let css=`.container {\n  display: flex;\n  flex-direction: ${dir};\n  justify-content: ${just};\n  align-items: ${ali};\n  flex-wrap: ${wrap};`;
  if(ac!=='stretch')css+=`\n  align-content: ${ac};`;
  if(gap!=='0')css+=`\n  gap: ${gap}px;`;
  css+='\n}';
  document.getElementById('code').textContent=css;
}
render();
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
</html>
