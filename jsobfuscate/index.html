function genHex(n){
  const chars='abcdef';
  let r='';
  do{r=chars[n%6]+r;n=Math.floor(n/6)}while(n>0);
  return r+'x'+(Math.random()*0xfff|0).toString(16);
}
function rnd(){return Math.random()*0xffff|0}
function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
