<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorName — Find the Nearest CSS Named Color for Any Hex/RGB Value</title>
<meta name="description" content="Paste any hex or RGB color and find the nearest CSS named color. Shows closest match with distance. Free color name finder.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh}
main{max-width:550px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
.input-area{display:flex;gap:.5rem;margin-bottom:1.5rem}
.input-area input[type=text]{flex:1;padding:.6rem;border:2px solid #e5e5e5;border-radius:8px;font-size:1rem;font-family:inherit;outline:none}
.input-area input[type=text]:focus{border-color:#8b5cf6}
.input-area input[type=color]{width:50px;height:44px;border:none;cursor:pointer;border-radius:8px}
.preview{display:flex;gap:1rem;margin-bottom:1.5rem}
.color-box{flex:1;border-radius:14px;height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.08)}
.color-box .label{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700;opacity:.7;margin-bottom:.3rem}
.color-box .name{font-size:1rem;font-weight:800}
.color-box .hex{font-size:.78rem;font-family:'SF Mono',monospace;margin-top:.2rem}
.arrow{display:flex;align-items:center;font-size:1.5rem;color:#ccc}
.matches{display:flex;flex-direction:column;gap:.4rem}
.match{display:flex;align-items:center;gap:.6rem;padding:.6rem;background:#fff;border:1px solid #eee;border-radius:8px;cursor:pointer;transition:border-color .15s}
.match:hover{border-color:#8b5cf6}
.match .swatch{width:36px;height:36px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.match .info{flex:1}
.match .info .name{font-weight:700;font-size:.85rem}
.match .info .hex{font-size:.72rem;color:#999;font-family:'SF Mono',monospace}
.match .dist{font-size:.7rem;color:#999;font-weight:600}
.section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:#999;font-weight:700;margin:1rem 0 .5rem}
</style>
</head>
<body style="padding-top:48px"><div style="position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)"><a href="/" style="display:flex;align-items:center;gap:.4rem;text-decoration:none;font-size:.82rem;font-weight:700;color:#a78bfa">← Back</a><a href="/" style="display:flex;align-items:center;gap:.3rem;text-decoration:none;font-size:.82rem;font-weight:800;color:#e0e0e0">🛠️ TinyTools</a></div>
<style>
.tt-nav{position:sticky;top:0;z-index:999;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1c1c1c;padding:0 1rem;font-family:'Inter',system-ui,sans-serif}
.tt-nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}

.tt-nav .tt-logo{font-size:.72rem;font-weight:800;letter-spacing:-.02em}
.tt-nav .tt-logo span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>

<main>
<h1>Color → Name</h1>
<div class="input-area">
<input type="text" id="input" placeholder="#8b5cf6 or rgb(139,92,246)" value="#8b5cf6" oninput="find()">
<input type="color" id="picker" value="#8b5cf6" oninput="document.getElementById('input').value=this.value;find()">
</div>
<div class="preview" id="preview"></div>
<div class="section-title">Top 5 Closest Named Colors</div>
<div class="matches" id="matches"></div>
</main>
<script>
const named={"aliceblue":"#f0f8ff","antiquewhite":"#faebd7","aqua":"#00ffff","aquamarine":"#7fffd4","azure":"#f0ffff","beige":"#f5f5dc","bisque":"#ffe4c4","black":"#000000","blanchedalmond":"#ffebcd","blue":"#0000ff","blueviolet":"#8a2be2","brown":"#a52a2a","burlywood":"#deb887","cadetblue":"#5f9ea0","chartreuse":"#7fff00","chocolate":"#d2691e","coral":"#ff7f50","cornflowerblue":"#6495ed","cornsilk":"#fff8dc","crimson":"#dc143c","cyan":"#00ffff","darkblue":"#00008b","darkcyan":"#008b8b","darkgoldenrod":"#b8860b","darkgray":"#a9a9a9","darkgreen":"#006400","darkkhaki":"#bdb76b","darkmagenta":"#8b008b","darkolivegreen":"#556b2f","darkorange":"#ff8c00","darkorchid":"#9932cc","darkred":"#8b0000","darksalmon":"#e9967a","darkseagreen":"#8fbc8f","darkslateblue":"#483d8b","darkslategray":"#2f4f4f","darkturquoise":"#00ced1","darkviolet":"#9400d3","deeppink":"#ff1493","deepskyblue":"#00bfff","dimgray":"#696969","dodgerblue":"#1e90ff","firebrick":"#b22222","floralwhite":"#fffaf0","forestgreen":"#228b22","fuchsia":"#ff00ff","gainsboro":"#dcdcdc","ghostwhite":"#f8f8ff","gold":"#ffd700","goldenrod":"#daa520","gray":"#808080","green":"#008000","greenyellow":"#adff2f","honeydew":"#f0fff0","hotpink":"#ff69b4","indianred":"#cd5c5c","indigo":"#4b0082","ivory":"#fffff0","khaki":"#f0e68c","lavender":"#e6e6fa","lavenderblush":"#fff0f5","lawngreen":"#7cfc00","lemonchiffon":"#fffacd","lightblue":"#add8e6","lightcoral":"#f08080","lightcyan":"#e0ffff","lightgoldenrodyellow":"#fafad2","lightgray":"#d3d3d3","lightgreen":"#90ee90","lightpink":"#ffb6c1","lightsalmon":"#ffa07a","lightseagreen":"#20b2aa","lightskyblue":"#87cefa","lightslategray":"#778899","lightsteelblue":"#b0c4de","lightyellow":"#ffffe0","lime":"#00ff00","limegreen":"#32cd32","linen":"#faf0e6","magenta":"#ff00ff","maroon":"#800000","mediumaquamarine":"#66cdaa","mediumblue":"#0000cd","mediumorchid":"#ba55d3","mediumpurple":"#9370db","mediumseagreen":"#3cb371","mediumslateblue":"#7b68ee","mediumspringgreen":"#00fa9a","mediumturquoise":"#48d1cc","mediumvioletred":"#c71585","midnightblue":"#191970","mintcream":"#f5fffa","mistyrose":"#ffe4e1","moccasin":"#ffe4b5","navajowhite":"#ffdead","navy":"#000080","oldlace":"#fdf5e6","olive":"#808000","olivedrab":"#6b8e23","orange":"#ffa500","orangered":"#ff4500","orchid":"#da70d6","palegoldenrod":"#eee8aa","palegreen":"#98fb98","paleturquoise":"#afeeee","palevioletred":"#db7093","papayawhip":"#ffefd5","peachpuff":"#ffdab9","peru":"#cd853f","pink":"#ffc0cb","plum":"#dda0dd","powderblue":"#b0e0e6","purple":"#800080","rebeccapurple":"#663399","red":"#ff0000","rosybrown":"#bc8f8f","royalblue":"#4169e1","saddlebrown":"#8b4513","salmon":"#fa8072","sandybrown":"#f4a460","seagreen":"#2e8b57","seashell":"#fff5ee","sienna":"#a0522d","silver":"#c0c0c0","skyblue":"#87ceeb","slateblue":"#6a5acd","slategray":"#708090","snow":"#fffafa","springgreen":"#00ff7f","steelblue":"#4682b4","tan":"#d2b48c","teal":"#008080","thistle":"#d8bfd8","tomato":"#ff6347","turquoise":"#40e0d0","violet":"#ee82ee","wheat":"#f5deb3","white":"#ffffff","whitesmoke":"#f5f5f5","yellow":"#ffff00","yellowgreen":"#9acd32"};

function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');return[parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)]}
function parseColor(str){
  str=str.trim();
  if(str.startsWith('#'))return hexToRgb(str);
  const m=str.match(/rgb\w?\(\s*(\d+),?\s*(\d+),?\s*(\d+)/i);
  if(m)return[parseInt(m[1]),parseInt(m[2]),parseInt(m[3])];
  if(/^[0-9a-f]{3,6}$/i.test(str))return hexToRgb(str);
  return null;
}
function colorDist(a,b){return Math.sqrt(Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2)+Math.pow(a[2]-b[2],2))}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('')}
function textColor(r,g,b){return(r*299+g*587+b*114)/1000>128?'#000':'#fff'}

function find(){
  const rgb=parseColor(document.getElementById('input').value);
  if(!rgb){document.getElementById('preview').innerHTML='';document.getElementById('matches').innerHTML='';return}
  document.getElementById('picker').value=rgbToHex(...rgb);
  
  const results=Object.entries(named).map(([name,hex])=>{
    const nrgb=hexToRgb(hex);
    return{name,hex,rgb:nrgb,dist:colorDist(rgb,nrgb)};
  }).sort((a,b)=>a.dist-b.dist);
  
  const best=results[0];
  const tc=textColor(...rgb);
  const btc=textColor(...best.rgb);
  
  document.getElementById('preview').innerHTML=`
    <div class="color-box" style="background:${rgbToHex(...rgb)};color:${tc}"><div class="label">Your Color</div><div class="hex">${rgbToHex(...rgb)}</div></div>
    <div class="arrow">→</div>
    <div class="color-box" style="background:${best.hex};color:${btc}"><div class="label">Closest Match</div><div class="name">${best.name}</div><div class="hex">${best.hex}</div></div>`;
  
  document.getElementById('matches').innerHTML=results.slice(0,5).map(r=>`<div class="match" onclick="document.getElementById('input').value='${r.hex}';find()"><div class="swatch" style="background:${r.hex}"></div><div class="info"><div class="name">${r.name}</div><div class="hex">${r.hex} · rgb(${r.rgb.join(', ')})</div></div><div class="dist">Δ ${r.dist.toFixed(1)}</div></div>`).join('');
}
find();
</script>
</body>
</html>
