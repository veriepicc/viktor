<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator — Create Beautiful Color Palettes from Any Color</title>
<meta name="description" content="Generate harmonious color palettes. Complementary, analogous, triadic, split-complementary, and monochromatic. Export for CSS, Tailwind, Figma.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#111;color:#e5e5e5;min-height:100vh}
main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
.input-row{display:flex;gap:.5rem;margin-bottom:1rem}
.input-row input[type=text]{flex:1;padding:.6rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:1rem;font-family:'SF Mono',monospace;outline:none}
.input-row input[type=color]{width:50px;height:44px;border:none;border-radius:8px;cursor:pointer}
.modes{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:1.5rem}
.mode{padding:.3rem .6rem;border-radius:5px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid #333;color:#888;background:#1a1a1a}
.mode.active{border-color:#fff;color:#fff}
.palette{display:flex;border-radius:14px;overflow:hidden;height:160px;margin-bottom:1rem;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.palette .swatch{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:.6rem .2rem;cursor:pointer;transition:flex .2s}
.palette .swatch:hover{flex:1.5}
.palette .swatch .hex{font-size:.65rem;font-family:'SF Mono',monospace;font-weight:700;padding:.2rem .3rem;background:rgba(0,0,0,.3);border-radius:3px}
.export{background:#1a1a1a;border:1px solid #333;border-radius:10px;overflow:hidden;margin-bottom:1rem}
.export .head{display:flex;justify-content:space-between;padding:.4rem .6rem;border-bottom:1px solid #333;font-size:.65rem;color:#666}
.export .head button{background:#fff;color:#000;border:none;padding:.15rem .4rem;border-radius:3px;font-size:.6rem;font-weight:700;cursor:pointer}
.export pre{padding:.5rem;font-size:.7rem;font-family:'SF Mono',monospace;overflow-x:auto;line-height:1.5;color:#888}
.random-btn{display:block;margin:0 auto 1rem;padding:.4rem 1rem;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;border:1px solid #333;color:#888;background:#1a1a1a}
.random-btn:hover{border-color:#fff;color:#fff}
</style>
</head>
<body>
<style>
.tt-nav{position:sticky;top:0;z-index:999;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1c1c1c;padding:0 1rem;font-family:'Inter',system-ui,sans-serif}
.tt-nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}
.tt-nav a{text-decoration:none;color:#ededed;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem;transition:opacity .15s}
.tt-nav a:hover{opacity:.7}
.tt-nav .tt-logo{font-size:.72rem;font-weight:800;letter-spacing:-.02em}
.tt-nav .tt-logo span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tt-nav .tt-back{color:#a0a0a0;font-size:.68rem}
</style>
<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>

<main>
<h1>Color Palette Generator</h1>
<div class="input-row">
<input type="text" id="input" value="#6366f1" oninput="gen()">
<input type="color" id="picker" value="#6366f1" oninput="document.getElementById('input').value=this.value;gen()">
</div>
<button class="random-btn" onclick="randomColor()">🎲 Random Color</button>
<div class="modes" id="modes"></div>
<div id="palettes"></div>
</main>
<script>
const modes=['Complementary','Analogous','Triadic','Split-Complementary','Monochromatic','Square','Tetradic'];
let currentMode='Analogous';

document.getElementById('modes').innerHTML=modes.map(m=>`<div class="mode ${m===currentMode?'active':''}" onclick="setMode('${m}',this)">${m}</div>`).join('');

function setMode(m,el){currentMode=m;document.querySelectorAll('.mode').forEach(b=>b.classList.remove('active'));el.classList.add('active');gen()}

function hexToHsl(hex){
  hex=hex.replace('#','');
  let r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{
    const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break}
    h/=6;
  }
  return[h*360,s*100,l*100];
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};
  return'#'+f(0)+f(8)+f(4);
}
function textC(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>128?'#000':'#fff'}

function generatePalette(hex,mode){
  const[h,s,l]=hexToHsl(hex);
  switch(mode){
    case'Complementary':return[hex,hslToHex(h+180,s,l)];
    case'Analogous':return[hslToHex(h-30,s,l),hex,hslToHex(h+30,s,l),hslToHex(h+60,s,l),hslToHex(h-60,s,l)];
    case'Triadic':return[hex,hslToHex(h+120,s,l),hslToHex(h+240,s,l)];
    case'Split-Complementary':return[hex,hslToHex(h+150,s,l),hslToHex(h+210,s,l)];
    case'Monochromatic':return[hslToHex(h,s,l*0.3),hslToHex(h,s,l*0.6),hex,hslToHex(h,s,Math.min(l*1.3,95)),hslToHex(h,s,Math.min(l*1.6,97))];
    case'Square':return[hex,hslToHex(h+90,s,l),hslToHex(h+180,s,l),hslToHex(h+270,s,l)];
    case'Tetradic':return[hex,hslToHex(h+60,s,l),hslToHex(h+180,s,l),hslToHex(h+240,s,l)];
  }
}

function gen(){
  let hex=document.getElementById('input').value.trim();
  if(!hex.startsWith('#'))hex='#'+hex;
  if(!/^#[0-9a-f]{6}$/i.test(hex))return;
  document.getElementById('picker').value=hex;
  
  const colors=generatePalette(hex,currentMode);
  
  let html=`<div class="palette">${colors.map(c=>`<div class="swatch" style="background:${c}" onclick="navigator.clipboard.writeText('${c}')"><span class="hex" style="color:${textC(c)}">${c}</span></div>`).join('')}</div>`;
  
  // CSS export
  const cssVars=colors.map((c,i)=>`  --color-${i+1}: ${c};`).join('\n');
  html+=`<div class="export"><div class="head"><span>CSS Variables</span><button onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.textContent)">Copy</button></div><pre>:root {\n${cssVars}\n}</pre></div>`;
  
  // Tailwind config
  const twColors=colors.map((c,i)=>`  '${i+1}00': '${c}',`).join('\n');
  html+=`<div class="export"><div class="head"><span>Tailwind Config</span><button onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.textContent)">Copy</button></div><pre>colors: {\n  brand: {\n${twColors}\n  }\n}</pre></div>`;
  
  document.getElementById('palettes').innerHTML=html;
}

function randomColor(){
  const hex='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  document.getElementById('input').value=hex;gen();
}
gen();
</script>
</body>
</html>
