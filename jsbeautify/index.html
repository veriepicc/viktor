<main>
<h1>✨ JavaScript Beautifier</h1>
<div class="opts">
<label>Indent: <select id="indentChar"><option value="space">Spaces</option><option value="tab">Tabs</option></select></label>
<label>Size: <input type="number" id="indentSize" value="2" min="1" max="8"></label>
<label><input type="checkbox" id="addSemis" checked> Add semicolons</label>
<label><input type="checkbox" id="singleQuotes"> Single quotes</label>
</div>
<div class="split">
<div class="pane"><div class="pane-head"><span>Minified / Ugly Input</span><button onclick="loadSample()">Sample</button></div><textarea id="input" placeholder="Paste minified JS...">function fibonacci(n){if(n<=0)return 0;if(n===1)return 1;let prev=0;let curr=1;for(let i=2;i<=n;i++){const temp=curr;curr=prev+curr;prev=temp}return curr}const seq=[];for(let i=0;i<20;i++){seq.push(fibonacci(i))}console.log("Fibonacci:",seq.join(", "))</textarea></div>
<div class="pane"><div class="pane-head"><span>Beautified Output</span><button onclick="navigator.clipboard.writeText(document.getElementById('output').value)">Copy</button></div><textarea id="output" readonly></textarea></div>
</div>
<button class="btn" onclick="beautify()">Beautify</button>
</main>
<script>
function beautify(){
  const code=document.getElementById('input').value;
  if(!code.trim()){document.getElementById('output').value='';return}
  
  const useTab=document.getElementById('indentChar').value==='tab';
  const size=parseInt(document.getElementById('indentSize').value)||2;
  const indent=useTab?'\t':' '.repeat(size);
  const addSemis=document.getElementById('addSemis').checked;
  const singleQ=document.getElementById('singleQuotes').checked;
  
  let result='';
  let level=0;
  let inString=false;
  let stringChar='';
  let i=0;
  let needNewline=false;
  
  while(i<code.length){
    const ch=code[i];
    const next=code[i+1]||'';
    
    // String handling
    if(!inString&&(ch==='"'||ch==="'"||ch==='`')){
      inString=true;stringChar=ch;
      if(singleQ&&ch==='"')result+="'";
      else result+=ch;
      i++;continue;
    }
    if(inString){
      if(ch==='\\'){ result+=ch+next;i+=2;continue}
      if(ch===stringChar){
        inString=false;
        if(singleQ&&ch==='"')result+="'";
        else result+=ch;
        i++;continue;
      }
      result+=ch;i++;continue;
    }
    
    if(ch==='{'){
      result+=' {\n'+indent.repeat(level+1);
      level++;i++;continue;
    }
    if(ch==='}'){
      level=Math.max(0,level-1);
      result+='\n'+indent.repeat(level)+'}';
      if(next!==';'&&next!==','&&next!==')'&&next!=='}')result+='\n'+indent.repeat(level);
      i++;continue;
    }
    if(ch===';'){
      result+=';\n'+indent.repeat(level);
      i++;
      while(i<code.length&&code[i]===' ')i++;
      continue;
    }
    if(ch===','&&!inString){
      result+=', ';i++;
      while(i<code.length&&code[i]===' ')i++;
      continue;
    }
    
    // Operators spacing
    if((ch==='='||ch==='!'||ch==='<'||ch==='>')&&next==='='){
      result+=' '+ch+'=';i+=2;
      if(code[i]==='='){result+='=';i++}
      result+=' ';continue;
    }
    if(ch==='='&&next!=='='&&next!=='>'){
      result+=' = ';i++;continue;
    }
    
    result+=ch;
    i++;
  }
  
  // Clean up
  result=result.replace(/\n\s*\n\s*\n/g,'\n\n');
  result=result.replace(/\n\s+$/gm,'');
  result=result.trim();
  
  document.getElementById('output').value=result;
}

function loadSample(){
  document.getElementById('input').value='class Router{constructor(){this.routes={GET:{},POST:{}}}get(path,handler){this.routes.GET[path]=handler;return this}post(path,handler){this.routes.POST[path]=handler;return this}handle(method,path,req){const handler=this.routes[method]?.[path];if(!handler){return{status:404,body:"Not Found"}}return handler(req)}}const router=new Router();router.get("/users",(req)=>{return{status:200,body:[{id:1,name:"John"}]}});console.log(router.handle("GET","/users",{}))';
  beautify();
}
beautify();
</script>
