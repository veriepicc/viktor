<main>
<h1>📦 JavaScript Minifier</h1>
<div class="opts">
<label><input type="checkbox" id="rmComments" checked> Remove comments</label>
<label><input type="checkbox" id="rmWhitespace" checked> Remove whitespace</label>
<label><input type="checkbox" id="rmNewlines" checked> Remove newlines</label>
<label><input type="checkbox" id="rmSemicolons"> Remove trailing semicolons</label>
</div>
<div class="split">
<div class="pane"><div class="pane-head"><span>Input</span><button onclick="loadSample()">Sample</button></div><textarea id="input" placeholder="Paste JavaScript..." oninput="minify()">// Calculate fibonacci sequence
function fibonacci(n) {
  // Base cases
  if (n <= 0) return 0;
  if (n === 1) return 1;
  
  /* Use iterative approach
     for better performance */
  let prev = 0;
  let curr = 1;
  
  for (let i = 2; i <= n; i++) {
    const temp = curr;
    curr = prev + curr;
    prev = temp;
  }
  
  return curr;
}

// Generate first 20 fibonacci numbers
const sequence = [];
for (let i = 0; i < 20; i++) {
  sequence.push(fibonacci(i));
}
console.log("Fibonacci:", sequence.join(", "));</textarea></div>
<div class="pane"><div class="pane-head"><span>Minified</span><button onclick="navigator.clipboard.writeText(document.getElementById('output').value)">Copy</button></div><textarea id="output" readonly></textarea></div>
</div>
<div class="stats" id="stats"></div>
<button class="btn" onclick="minify()">Minify</button>
</main>
<script>
function minify(){
  let code=document.getElementById('input').value;
  const origLen=new Blob([code]).size;
  if(!code.trim()){document.getElementById('output').value='';document.getElementById('stats').innerHTML='';return}
  
  if(document.getElementById('rmComments').checked){
    // Remove single-line comments (but not URLs with //)
    code=code.replace(/([^:\/])\/\/[^\n]*/g,'$1');
    // Remove multi-line comments
    code=code.replace(/\/\*[\s\S]*?\*\//g,'');
  }
  if(document.getElementById('rmWhitespace').checked){
    code=code.replace(/\s{2,}/g,' ');
    code=code.replace(/\s*([{}();,=+\-*/<>!&|?:])\s*/g,'$1');
    // Add back needed spaces
    code=code.replace(/\b(return|var|let|const|function|if|else|for|while|typeof|instanceof|new|throw|case|in|of)\b/g,' $1 ');
    code=code.replace(/^\s+/,'');
  }
  if(document.getElementById('rmNewlines').checked){
    code=code.replace(/\n+/g,'');
  }
  if(document.getElementById('rmSemicolons').checked){
    code=code.replace(/;}/g,'}');
    code=code.replace(/;$/,'');
  }
  code=code.replace(/\s{2,}/g,' ').trim();
  
  document.getElementById('output').value=code;
  const minLen=new Blob([code]).size;
  const saved=origLen-minLen;
  const pct=((saved/origLen)*100).toFixed(1);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="val">${fmtB(origLen)}</div><div class="label">Original</div></div>
    <div class="stat"><div class="val">${fmtB(minLen)}</div><div class="label">Minified</div></div>
    <div class="stat green"><div class="val">-${pct}%</div><div class="label">Saved ${fmtB(saved)}</div></div>`;
}
function fmtB(b){return b>1024?(b/1024).toFixed(1)+' KB':b+' B'}
function loadSample(){document.getElementById('input').value=`/**
 * Simple Express-like router
 * Handles GET, POST, PUT, DELETE
 */
class Router {
  constructor() {
    this.routes = {
      GET: {},
      POST: {},
      PUT: {},
      DELETE: {}
    };
  }

  // Register a route
  get(path, handler) {
    this.routes.GET[path] = handler;
    return this;
  }

  post(path, handler) {
    this.routes.POST[path] = handler;
    return this;
  }

  // Handle incoming request
  handle(method, path, req) {
    const handler = this.routes[method]?.[path];
    if (!handler) {
      return { status: 404, body: "Not Found" };
    }
    return handler(req);
  }
}

// Usage
const router = new Router();
router.get("/api/users", (req) => {
  return { status: 200, body: [{ id: 1, name: "John" }] };
});

const response = router.handle("GET", "/api/users", {});
console.log(response);`;minify()}
minify();
</script>
