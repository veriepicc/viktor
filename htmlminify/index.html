<div class="pane"><div class="pane-head"><span>Minified</span><button onclick="navigator.clipboard.writeText(document.getElementById('output').value)">Copy</button></div><textarea id="output" readonly></textarea></div>
</div>
<div class="stats" id="stats"></div>
<button class="btn" onclick="minify()">Minify HTML</button>
</main>
<script>
function minify(){
  let html=document.getElementById('input').value;
  const origLen=new Blob([html]).size;
  if(!html.trim()){document.getElementById('output').value='';return}
  
  html=html.replace(/<!--[\s\S]*?-->/g,'');
  html=html.replace(/\n\s*/g,'');
  html=html.replace(/\s{2,}/g,' ');
  html=html.replace(/>\s+</g,'><');
  html=html.replace(/\s+>/g,'>');
  html=html.replace(/"\s+/g,'" ');
  html=html.trim();
  
  document.getElementById('output').value=html;
  const minLen=new Blob([html]).size;
  const pct=((1-minLen/origLen)*100).toFixed(1);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="val">${origLen>1024?(origLen/1024).toFixed(1)+' KB':origLen+' B'}</div><div class="label">Original</div></div>
    <div class="stat"><div class="val">${minLen>1024?(minLen/1024).toFixed(1)+' KB':minLen+' B'}</div><div class="label">Minified</div></div>
    <div class="stat green"><div class="val">-${pct}%</div><div class="label">Saved</div></div>`;
}
minify();
</script>
