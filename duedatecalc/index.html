<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Days Between Dates, Add/Subtract Days</title>
<meta name="description" content="Calculate days between two dates. Add or subtract days, weeks, months from a date. Countdown to future dates. Free date calculator.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}
main{max-width:500px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
.tabs{display:flex;gap:.3rem;margin-bottom:1rem}
.tab{flex:1;padding:.5rem;text-align:center;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:1px solid #e2e8f0;color:#64748b;background:#f1f5f9}
.tab.active{background:#0f172a;color:#fff;border-color:#0f172a}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:#64748b;font-weight:600;margin-bottom:.3rem}
.field input,.field select{width:100%;padding:.55rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.95rem;outline:none;font-family:inherit}
.field input:focus{border-color:#3b82f6}
.row{display:flex;gap:.5rem;align-items:end}.row .field{flex:1}
.result{text-align:center;padding:1.5rem;background:#f0f9ff;border-radius:12px;margin-top:.5rem}
.result .big{font-size:2.5rem;font-weight:900;color:#0369a1}
.result .sub{font-size:.8rem;color:#64748b;margin-top:.3rem;line-height:1.6}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/duedatecalc/">
<meta property="og:url" content="https://tinytools.store/duedatecalc/">

<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style id="tt-ds">
:root{--bg:#e8e6df!important;--surface:#f3f1ea!important;--surface2:#fbfaf6!important;--border:rgba(22,19,15,.13)!important;--border2:rgba(22,19,15,.22)!important;--accent:#d6451f!important;--accent2:#d6451f!important;--text:#16130f!important;--text2:#5b564d!important;--muted:#9c958a!important;--code-bg:#fbfaf6!important;--tt-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace}
body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}
.ttbar{position:fixed;top:0;left:0;right:0;width:100%;z-index:99999;display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 1.3rem;background:rgba(232,230,223,.82);backdrop-filter:blur(16px) saturate(130%);border-bottom:1px solid rgba(22,19,15,.13);box-sizing:border-box}
.ttbar .l{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;color:#16130f;text-decoration:none}
.ttbar .l svg{width:17px;height:17px;color:#d6451f;stroke-width:2.2}
.ttbar .b{display:inline-flex;align-items:center;gap:.45rem;font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#16130f;text-decoration:none}
.ttbar .b svg{width:18px;height:18px;color:#d6451f;stroke-width:1.8}
.ttbar .t{font-family:var(--tt-mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c958a;border:1px solid rgba(22,19,15,.22);border-radius:5px;padding:.18rem .45rem}
@media(max-width:560px){.ttbar .t{display:none}}

</head>
<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>Date Calculator</h1>
<div class="tabs">
<div class="tab active" onclick="setMode('between',this)">Days Between</div>
<div class="tab" onclick="setMode('add',this)">Add/Subtract</div>
</div>
<div id="betweenMode">
<div class="card">
<div class="row">
<div class="field"><label>Start Date</label><input type="date" id="d1" onchange="calcBetween()"></div>
<div class="field"><label>End Date</label><input type="date" id="d2" onchange="calcBetween()"></div>
</div>
<div class="result" id="betweenResult"></div>
</div>
</div>
<div id="addMode" style="display:none">
<div class="card">
<div class="field"><label>Start Date</label><input type="date" id="startDate" onchange="calcAdd()"></div>
<div class="row">
<div class="field"><label>Amount</label><input type="number" id="addAmount" value="30" oninput="calcAdd()"></div>
<div class="field"><label>Unit</label><select id="addUnit" onchange="calcAdd()"><option value="days">Days</option><option value="weeks">Weeks</option><option value="months">Months</option><option value="years">Years</option></select></div>
<div class="field"><label>Direction</label><select id="addDir" onchange="calcAdd()"><option value="add">Add (+)</option><option value="sub">Subtract (−)</option></select></div>
</div>
<div class="result" id="addResult"></div>
</div>
</div>
</main>
<script>
const today=new Date().toISOString().split('T')[0];
document.getElementById('d1').value=today;
const d2=new Date();d2.setDate(d2.getDate()+30);
document.getElementById('d2').value=d2.toISOString().split('T')[0];
document.getElementById('startDate').value=today;

function setMode(m,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('betweenMode').style.display=m==='between'?'block':'none';document.getElementById('addMode').style.display=m==='add'?'block':'none'}

function calcBetween(){
  const d1=new Date(document.getElementById('d1').value);
  const d2=new Date(document.getElementById('d2').value);
  if(isNaN(d1)||isNaN(d2))return;
  const diffMs=Math.abs(d2-d1);
  const days=Math.round(diffMs/86400000);
  const weeks=Math.floor(days/7);
  const remainDays=days%7;
  
  let y=0,m=0,d=0;
  const [start,end]=d1<d2?[new Date(d1),d2]:[new Date(d2),d1];
  y=end.getFullYear()-start.getFullYear();
  m=end.getMonth()-start.getMonth();
  d=end.getDate()-start.getDate();
  if(d<0){m--;const prev=new Date(end.getFullYear(),end.getMonth(),0);d+=prev.getDate()}
  if(m<0){y--;m+=12}
  
  const hours=Math.round(diffMs/3600000);
  const minutes=Math.round(diffMs/60000);
  
  document.getElementById('betweenResult').innerHTML=`<div class="big">${days.toLocaleString()} days</div><div class="sub">${y} years, ${m} months, ${d} days<br>${weeks} weeks and ${remainDays} days<br>${hours.toLocaleString()} hours · ${minutes.toLocaleString()} minutes</div>`;
}

function calcAdd(){
  const start=new Date(document.getElementById('startDate').value);
  if(isNaN(start))return;
  const amount=parseInt(document.getElementById('addAmount').value)||0;
  const unit=document.getElementById('addUnit').value;
  const dir=document.getElementById('addDir').value==='add'?1:-1;
  
  const result=new Date(start);
  switch(unit){
    case'days':result.setDate(result.getDate()+amount*dir);break;
    case'weeks':result.setDate(result.getDate()+amount*7*dir);break;
    case'months':result.setMonth(result.getMonth()+amount*dir);break;
    case'years':result.setFullYear(result.getFullYear()+amount*dir);break;
  }
  
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('addResult').innerHTML=`<div class="big">${result.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div><div class="sub">${dayNames[result.getDay()]}<br>${result.toISOString().split('T')[0]}</div>`;
}
calcBetween();calcAdd();
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
</html>
