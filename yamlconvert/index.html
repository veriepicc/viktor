<script>
// Minimal YAML parser (handles common cases)
function parseYaml(text){
  const lines=text.split('\n');
  const result={};
  const stack=[{obj:result,indent:-1}];
  let currentArray=null;
  
  for(let line of lines){
    if(!line.trim()||line.trim().startsWith('#'))continue;
    const indent=line.search(/\S/);
    const content=line.trim();
    
    // Pop stack to correct level
    while(stack.length>1&&stack[stack.length-1].indent>=indent){
      stack.pop();
    }
    const parent=stack[stack.length-1].obj;
    
    // Array item
    if(content.startsWith('- ')){
      const val=content.slice(2).trim();
      if(!Array.isArray(parent)){
        // Find the key this array belongs to
        const lastKey=Object.keys(parent).pop();
        if(lastKey&&parent[lastKey]===null)parent[lastKey]=[];
        if(Array.isArray(parent[lastKey])){
          if(val.includes(': ')){
            const obj={};
            const pairs=val.split(', ');
            for(const pair of pairs){
              const[k,...v]=pair.split(': ');
              obj[k.trim()]=parseValue(v.join(': ').trim());
            }
            // Check for continuation
            parent[lastKey].push(obj);
            stack.push({obj:obj,indent:indent+2});
          }else{
            parent[lastKey].push(parseValue(val));
          }
        }
      }else{
        if(val.includes(': ')){
          const obj={};
          const[k,...v]=val.split(': ');
          obj[k.trim()]=parseValue(v.join(': ').trim());
          parent.push(obj);
          stack.push({obj:obj,indent:indent+2});
        }else{
          parent.push(parseValue(val));
        }
      }
      continue;
    }
    
    // Key: value
    const colonIdx=content.indexOf(':');
    if(colonIdx>0){
      const key=content.slice(0,colonIdx).trim();
      const val=content.slice(colonIdx+1).trim();
      if(val===''){
        parent[key]=null; // Will be object or array
        stack.push({obj:parent,indent:indent,key:key});
        // Create nested object
        parent[key]={};
        stack.push({obj:parent[key],indent:indent});
      }else{
        parent[key]=parseValue(val);
      }
    }
  }
  return result;
}

function parseValue(v){
  if(v==='true')return true;
  if(v==='false')return false;
  if(v==='null'||v==='~')return null;
  if(/^-?\d+$/.test(v))return parseInt(v);
  if(/^-?\d+\.\d+$/.test(v))return parseFloat(v);
  if((v.startsWith('"')&&v.endsWith('"'))||(v.startsWith("'")&&v.endsWith("'")))return v.slice(1,-1);
  if(v.startsWith('[')&&v.endsWith(']')){
    try{return JSON.parse(v)}catch(e){return v}
  }
  return v;
}

function toYaml(obj,indent=0){
  const pad=' '.repeat(indent);
  let out='';
  if(Array.isArray(obj)){
    obj.forEach(item=>{
      if(typeof item==='object'&&item!==null&&!Array.isArray(item)){
        const keys=Object.keys(item);
        out+=pad+'- '+keys[0]+': '+formatVal(item[keys[0]])+'\n';
        keys.slice(1).forEach(k=>{
          out+=pad+'  '+k+': '+formatVal(item[k])+'\n';
        });
      }else{
        out+=pad+'- '+formatVal(item)+'\n';
      }
    });
  }else if(typeof obj==='object'&&obj!==null){
    Object.entries(obj).forEach(([k,v])=>{
      if(typeof v==='object'&&v!==null){
        out+=pad+k+':\n'+toYaml(v,indent+2);
      }else{
        out+=pad+k+': '+formatVal(v)+'\n';
      }
    });
  }
  return out;
}

function formatVal(v){
  if(v===null)return 'null';
  if(typeof v==='string'){
    if(v.includes(':')||v.includes('#')||v.includes('{')||v.includes('[')||v==='')return '"'+v+'"';
    return v;
  }
  return String(v);
}

function yamlToJson(){
  try{
    const yaml=document.getElementById('yaml').value;
    const obj=parseYaml(yaml);
    document.getElementById('json').value=JSON.stringify(obj,null,2);
    document.getElementById('error').textContent='';
  }catch(e){
    document.getElementById('error').textContent='⚠️ '+e.message;
  }
}
function jsonToYaml(){
  try{
    const obj=JSON.parse(document.getElementById('json').value);
    document.getElementById('yaml').value=toYaml(obj);
    document.getElementById('error').textContent='';
  }catch(e){
    document.getElementById('error').textContent='⚠️ '+e.message;
  }
}
</script>
