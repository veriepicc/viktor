<main>
<h1>🎨 CSS Minifier</h1>
<div class="split">
<div class="pane"><div class="pane-head"><span>Input CSS</span></div><textarea id="input" placeholder="Paste CSS..." oninput="minify()">/* Main layout styles */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem;
}

/* Navigation */
.navbar {
  display: flex;
  justify-content: space-between;

  display: flex;
  gap: 2rem;

}</textarea></div>
<div class="pane"><div class="pane-head"><span>Minified</span><button onclick="navigator.clipboard.writeText(document.getElementById('output').value)">Copy</button></div><textarea id="output" readonly></textarea></div>
</div>
<div class="stats" id="stats"></div>
<button class="btn" onclick="minify()">Minify CSS</button>
</main>
<script>
function minify(){
  let css=document.getElementById('input').value;
  const origLen=new Blob([css]).size;
  if(!css.trim()){document.getElementById('output').value='';return}
  
  css=css.replace(/\/\*[\s\S]*?\*\//g,'');
  css=css.replace(/\s+/g,' ');
  css=css.replace(/\s*([{}:;,>~+])\s*/g,'$1');
  css=css.replace(/;}/g,'}');
  css=css.replace(/\s*!important/g,'!important');
  css=css.replace(/:\s*0(px|em|rem|%|pt|vh|vw)/g,':0');
  css=css.trim();
  
  document.getElementById('output').value=css;
  const minLen=new Blob([css]).size;
  const pct=((1-minLen/origLen)*100).toFixed(1);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="val">${origLen>1024?(origLen/1024).toFixed(1)+' KB':origLen+' B'}</div><div class="label">Original</div></div>
    <div class="stat"><div class="val">${minLen>1024?(minLen/1024).toFixed(1)+' KB':minLen+' B'}</div><div class="label">Minified</div></div>
    <div class="stat green"><div class="val">-${pct}%</div><div class="label">Saved</div></div>`;
}
minify();
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
