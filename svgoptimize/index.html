<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Optimizer — Minify & Clean SVG Files Online</title>
<meta name="description" content="Optimize and minify SVG files. Remove comments, metadata, empty groups, round numbers. Preview before and after. Free SVG optimizer.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#e8e6df;color:#16130f;min-height:100vh}
main{max-width:750px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
.drop{border:2px dashed rgba(22,19,15,.13);border-radius:14px;padding:2.5rem;text-align:center;cursor:pointer;margin-bottom:1rem}
.drop:hover{border-color:#22d3ee}
.drop .icon{font-size:2rem;margin-bottom:.3rem}
.drop p{color:#666;font-size:.8rem}
.drop input{display:none}
.stats{display:flex;gap:.5rem;margin-bottom:1rem}
.stat{flex:1;padding:.8rem;background:#171717;border:1px solid #262626;border-radius:10px;text-align:center}
.stat .val{font-size:1.4rem;font-weight:900;color:#16130f}
.stat .label{font-size:.6rem;color:#666;text-transform:uppercase;margin-top:.2rem}
.stat.saved .val{color:#16130f}
.opts{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.opts label{display:flex;align-items:center;gap:.3rem;font-size:.75rem;cursor:pointer;color:#999}
.opts input{accent-color:#22d3ee}
.split{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem}
@media(max-width:600px){.split{grid-template-columns:1fr}}
.pane{background:#171717;border:1px solid #262626;border-radius:10px;overflow:hidden}
.pane-head{display:flex;justify-content:space-between;padding:.4rem .6rem;border-bottom:1px solid #262626;font-size:.65rem;color:#666;font-weight:600;text-transform:uppercase}
.pane-head button{background:#22d3ee;color:#000;border:none;padding:.2rem .5rem;border-radius:4px;font-size:.6rem;font-weight:700;cursor:pointer}
.pane pre{padding:.5rem;font-size:.68rem;font-family:'SF Mono',monospace;max-height:250px;overflow:auto;line-height:1.5;color:#888}
.pane .svg-preview{padding:1rem;display:flex;align-items:center;justify-content:center;min-height:120px;background:repeating-conic-gradient(#f3f1ea 0% 25%,#e8e6df 0% 50%) 50%/16px 16px}
.pane .svg-preview svg{max-width:100%;max-height:200px}
.btn{padding:.5rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;background:#22d3ee;color:#000;display:block;width:100%}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/svgoptimize/">
<meta property="og:url" content="https://tinytools.store/svgoptimize/">

<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style id="tt-ds">
:root{--bg:#e8e6df!important;--surface:#f3f1ea!important;--surface2:#fbfaf6!important;--border:rgba(22,19,15,.13)!important;--border2:rgba(22,19,15,.22)!important;--accent:#d6451f!important;--accent2:#d6451f!important;--text:#16130f!important;--text2:#5b564d!important;--muted:#9c958a!important;--code-bg:#fbfaf6!important;--tt-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace}
body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}
.ttbar{position:fixed;top:0;left:0;right:0;width:100%;z-index:99999;display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 1.3rem;background:rgba(232,230,223,.82);backdrop-filter:blur(16px) saturate(130%);border-bottom:1px solid rgba(22,19,15,.13);box-sizing:border-box}
.ttbar .l{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;color:#16130f;text-decoration:none}
.ttbar .l svg{width:17px;height:17px;color:#d6451f;stroke-width:2.2}
.ttbar .b{display:inline-flex;align-items:center;gap:.45rem;font-weight:800;font-size:.95rem;letter-spacing:-.02em;color:#16130f;text-decoration:none}
.ttbar .b svg{width:18px;height:18px;color:#d6451f;stroke-width:1.8}
.ttbar .t{font-family:var(--tt-mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#9c958a;border:1px solid rgba(22,19,15,.22);border-radius:5px;padding:.18rem .45rem}
@media(max-width:560px){.ttbar .t{display:none}}
</style>
</head>
<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>SVG Optimizer</h1>
<div class="drop" id="dropZone" onclick="document.getElementById('fi').click()">
<div class="icon">⚡</div>
<p>Drop an SVG file or click to browse</p>
<input type="file" id="fi" accept=".svg" onchange="loadFile(event)">
</div>
<div class="opts">
<label><input type="checkbox" id="rmComments" checked onchange="optimize()"> Remove comments</label>
<label><input type="checkbox" id="rmMeta" checked onchange="optimize()"> Remove metadata</label>
<label><input type="checkbox" id="rmEmpty" checked onchange="optimize()"> Remove empty groups</label>
<label><input type="checkbox" id="roundNums" checked onchange="optimize()"> Round decimals</label>
<label><input type="checkbox" id="rmIds" onchange="optimize()"> Remove IDs</label>
<label><input type="checkbox" id="minify" checked onchange="optimize()"> Minify whitespace</label>
</div>
<div class="stats" id="stats" style="display:none">
<div class="stat"><div class="val" id="origSize">-</div><div class="label">Original</div></div>
<div class="stat"><div class="val" id="optSize">-</div><div class="label">Optimized</div></div>
<div class="stat saved"><div class="val" id="savings">-</div><div class="label">Saved</div></div>
</div>
<div class="split">
<div class="pane"><div class="pane-head"><span>Original</span></div><div class="svg-preview" id="origPreview"></div></div>
<div class="pane"><div class="pane-head"><span>Optimized</span><button onclick="dl()">Download</button></div><div class="svg-preview" id="optPreview"></div></div>
</div>
<div class="split">
<div class="pane"><div class="pane-head"><span>Original Code</span></div><pre id="origCode"></pre></div>
<div class="pane"><div class="pane-head"><span>Optimized Code</span><button onclick="navigator.clipboard.writeText(optimized)">Copy</button></div><pre id="optCode"></pre></div>
</div>
</main>
<script>
let original='',optimized='';
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='#22d3ee'});
dz.addEventListener('dragleave',()=>dz.style.borderColor='');
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer.files[0])readSVG(e.dataTransfer.files[0])});
function loadFile(e){if(e.target.files[0])readSVG(e.target.files[0])}
function readSVG(file){const r=new FileReader();r.onload=e=>{original=e.target.result;optimize()};r.readAsText(file)}

function optimize(){
  if(!original)return;
  let svg=original;
  
  if(document.getElementById('rmComments').checked)svg=svg.replace(/<!--[\s\S]*?-->/g,'');
  if(document.getElementById('rmMeta').checked){svg=svg.replace(/<metadata[\s\S]*?<\/metadata>/gi,'');svg=svg.replace(/<\?xml[^?]*\?>/gi,'');svg=svg.replace(/<!DOCTYPE[^>]*>/gi,'')}
  if(document.getElementById('rmEmpty').checked)svg=svg.replace(/<g\s*>\s*<\/g>/g,'');
  if(document.getElementById('roundNums').checked)svg=svg.replace(/(\d+\.\d{3,})/g,(m)=>parseFloat(m).toFixed(2));
  if(document.getElementById('rmIds').checked)svg=svg.replace(/\s+id="[^"]*"/g,'');
  if(document.getElementById('minify').checked){svg=svg.replace(/\n\s*/g,'');svg=svg.replace(/\s{2,}/g,' ');svg=svg.replace(/>\s+</g,'><')}
  
  svg=svg.trim();
  optimized=svg;
  
  document.getElementById('origPreview').innerHTML=original;
  document.getElementById('optPreview').innerHTML=optimized;
  document.getElementById('origCode').textContent=original;
  document.getElementById('optCode').textContent=optimized;
  
  const origBytes=new Blob([original]).size;
  const optBytes=new Blob([optimized]).size;
  const pct=((1-optBytes/origBytes)*100).toFixed(1);
  document.getElementById('origSize').textContent=fmtSize(origBytes);
  document.getElementById('optSize').textContent=fmtSize(optBytes);
  document.getElementById('savings').textContent=pct+'%';
  document.getElementById('stats').style.display='flex';
}

function fmtSize(b){return b>1024?(b/1024).toFixed(1)+' KB':b+' B'}
function dl(){const a=document.createElement('a');a.download='optimized.svg';a.href=URL.createObjectURL(new Blob([optimized],{type:'image/svg+xml'}));a.click()}
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
</html>
