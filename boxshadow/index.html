<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Shadow Generator — Custom Shadows with Live Preview</title>
<meta name="description" content="Create CSS box shadows with live preview. Multiple layers, presets, inset shadows. Copy CSS code. Free box shadow generator.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔲</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a0a;min-height:100vh;color:#fff}main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
.preview-area{width:100%;height:220px;background:#f5f5f5;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem}
.preview-box{width:160px;height:120px;border-radius:12px;background:#fff;transition:all .2s}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:1rem;margin-bottom:1rem}
.card h3{font-size:.6rem;text-transform:uppercase;color:#666;font-weight:700;margin-bottom:.5rem}
.layers{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.5rem}
.layer{background:#1a1a1a;border:1px solid #272727;border-radius:6px;padding:.5rem;display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.layer input[type=color]{width:35px;height:24px;border:none;border-radius:3px;background:transparent;padding:0;cursor:pointer}
.layer input[type=range]{width:55px;accent-color:#3b82f6}
.layer .lbl{font-size:.52rem;color:#666;min-width:10px}
.layer .rm{background:none;border:none;color:#ef4444;cursor:pointer;font-size:1rem;padding:0 .2rem}
.layer label.inset{font-size:.6rem;color:#888;display:flex;align-items:center;gap:.2rem;cursor:pointer}
.layer label.inset input{accent-color:#3b82f6}
.btn{padding:.4rem .7rem;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;border:none;background:#222;color:#ccc}
.presets{display:flex;flex-wrap:wrap;gap:.3rem}
.preset{padding:.25rem .45rem;border-radius:5px;font-size:.62rem;font-weight:600;cursor:pointer;border:1px solid #333;color:#888;background:#1a1a1a}
.preset:hover{border-color:#3b82f6;color:#3b82f6}
.code{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:.7rem;font-family:'SF Mono',monospace;font-size:.72rem;color:#a5f3fc;word-break:break-all;cursor:pointer;margin-top:1rem}
.row{display:flex;gap:.5rem;align-items:center}
.field{flex:1}.field label{display:block;font-size:.55rem;color:#888;font-weight:600;margin-bottom:.2rem;text-transform:uppercase}
.field input[type=color]{width:100%;height:30px;padding:2px;background:#1a1a1a;border:1px solid #333;border-radius:5px}
</style>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://tinytools.store/boxshadow/">
<meta property="og:url" content="https://tinytools.store/boxshadow/">
</head>
<body style="padding-top:48px"><div style="position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)"><a href="/" style="display:flex;align-items:center;gap:.4rem;text-decoration:none;font-size:.82rem;font-weight:700;color:#a78bfa">← Back</a><a href="/" style="display:flex;align-items:center;gap:.3rem;text-decoration:none;font-size:.82rem;font-weight:800;color:#e0e0e0">🛠️ TinyTools</a></div>
<style>
.tt-nav{position:sticky;top:0;z-index:999;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1c1c1c;padding:0 1rem;font-family:'Inter',system-ui,sans-serif}
.tt-nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}
.tt-nav a{text-decoration:none;color:#ededed;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem;transition:opacity .15s}
.tt-nav a:hover{opacity:.7}
.tt-nav .tt-logo{font-size:.72rem;font-weight:800;letter-spacing:-.02em}
.tt-nav .tt-logo span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tt-nav .tt-back{color:#a0a0a0;font-size:.68rem}
</style>
<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>

<main>
<h1>🔲 Box Shadow Generator</h1>
<div class="preview-area" id="previewArea">
<div class="preview-box" id="previewBox"></div>
</div>
<div class="card">
<h3>Settings</h3>
<div class="row" style="margin-bottom:.5rem">
<div class="field"><label>Box Color</label><input type="color" id="boxColor" value="#ffffff" oninput="render()"></div>
<div class="field"><label>BG Color</label><input type="color" id="bgColor" value="#f5f5f5" oninput="render()"></div>
<div class="field"><label>Border Radius</label><input type="range" id="radius" min="0" max="50" value="12" oninput="render()" style="accent-color:#3b82f6"></div>
</div>
</div>
<div class="card">
<h3>Shadow Layers</h3>
<div class="layers" id="layers"></div>
<div style="display:flex;gap:.4rem">
<button class="btn" onclick="addLayer()">+ Add Layer</button>
</div>
</div>
<div class="card">
<h3>Presets</h3>
<div class="presets">
<div class="preset" onclick="loadPreset('subtle')">Subtle</div>
<div class="preset" onclick="loadPreset('medium')">Medium</div>
<div class="preset" onclick="loadPreset('large')">Large</div>
<div class="preset" onclick="loadPreset('sharp')">Sharp</div>
<div class="preset" onclick="loadPreset('dreamy')">Dreamy</div>
<div class="preset" onclick="loadPreset('neumorphism')">Neumorphism</div>
<div class="preset" onclick="loadPreset('brutal')">Brutal</div>
<div class="preset" onclick="loadPreset('layered')">Layered</div>
<div class="preset" onclick="loadPreset('inner')">Inner Glow</div>
</div>
</div>
<div class="code" id="code" onclick="navigator.clipboard.writeText(this.textContent)"></div>
</main>
<script>
let shadows=[{x:0,y:4,blur:20,spread:0,color:'#00000033',inset:false}];

const presetData={
  subtle:[{x:0,y:1,blur:3,spread:0,color:'#0000001a',inset:false},{x:0,y:1,blur:2,spread:-1,color:'#0000001a',inset:false}],
  medium:[{x:0,y:4,blur:6,spread:-1,color:'#0000001a',inset:false},{x:0,y:2,blur:4,spread:-2,color:'#0000001a',inset:false}],
  large:[{x:0,y:10,blur:15,spread:-3,color:'#0000001a',inset:false},{x:0,y:4,blur:6,spread:-4,color:'#0000001a',inset:false}],
  sharp:[{x:6,y:6,blur:0,spread:0,color:'#000000',inset:false}],
  dreamy:[{x:0,y:0,blur:30,spread:5,color:'#3b82f633',inset:false}],
  neumorphism:[{x:5,y:5,blur:10,spread:0,color:'#00000033',inset:false},{x:-5,y:-5,blur:10,spread:0,color:'#ffffff1a',inset:false}],
  brutal:[{x:4,y:4,blur:0,spread:0,color:'#000000',inset:false}],
  layered:[{x:0,y:1,blur:1,spread:0,color:'#0000000d',inset:false},{x:0,y:2,blur:2,spread:0,color:'#0000000d',inset:false},{x:0,y:4,blur:4,spread:0,color:'#0000000d',inset:false},{x:0,y:8,blur:8,spread:0,color:'#0000000d',inset:false},{x:0,y:16,blur:16,spread:0,color:'#0000000d',inset:false}],
  inner:[{x:0,y:0,blur:20,spread:5,color:'#3b82f644',inset:true}]
};

function loadPreset(name){shadows=JSON.parse(JSON.stringify(presetData[name]));renderLayers();render()}

function renderLayers(){
  document.getElementById('layers').innerHTML=shadows.map((s,i)=>`
    <div class="layer">
      <input type="color" value="${s.color.slice(0,7)}" oninput="shadows[${i}].color=this.value+shadows[${i}].color.slice(7);render()">
      <span class="lbl">X</span><input type="range" min="-50" max="50" value="${s.x}" oninput="shadows[${i}].x=+this.value;render()">
      <span class="lbl">Y</span><input type="range" min="-50" max="50" value="${s.y}" oninput="shadows[${i}].y=+this.value;render()">
      <span class="lbl">B</span><input type="range" min="0" max="80" value="${s.blur}" oninput="shadows[${i}].blur=+this.value;render()">
      <span class="lbl">S</span><input type="range" min="-20" max="20" value="${s.spread}" oninput="shadows[${i}].spread=+this.value;render()">
      <label class="inset"><input type="checkbox" ${s.inset?'checked':''} onchange="shadows[${i}].inset=this.checked;render()">inset</label>
      ${shadows.length>1?`<button class="rm" onclick="shadows.splice(${i},1);renderLayers();render()">×</button>`:''}
    </div>
  `).join('');
}

function addLayer(){shadows.push({x:0,y:4,blur:10,spread:0,color:'#00000033',inset:false});renderLayers();render()}

function render(){
  const box=document.getElementById('previewBox');
  const area=document.getElementById('previewArea');
  box.style.background=document.getElementById('boxColor').value;
  area.style.background=document.getElementById('bgColor').value;
  box.style.borderRadius=document.getElementById('radius').value+'px';
  
  const css=shadows.map(s=>`${s.inset?'inset ':''}${s.x}px ${s.y}px ${s.blur}px ${s.spread}px ${s.color}`).join(', ');
  box.style.boxShadow=css;
  document.getElementById('code').textContent=`box-shadow: ${css};`;
}
renderLayers();render();
</script>
</body>
</html>
