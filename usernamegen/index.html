<main>
<h1>👤 Username Generator</h1>
<div class="card">
<div class="field"><label>Your name or keyword</label><input type="text" id="keyword" value="" placeholder="e.g., shadow, wolf, pixel, luna"></div>
<div class="field"><label>Style</label>
<div class="styles">
<div class="style active" onclick="setStyle('gaming',this)">🎮 Gaming</div>
<div class="style" onclick="setStyle('aesthetic',this)">✨ Aesthetic</div>
<div class="style" onclick="setStyle('edgy',this)">⚡ Edgy</div>
<div class="style" onclick="setStyle('cute',this)">🌸 Cute</div>
<div class="style" onclick="setStyle('pro',this)">💼 Professional</div>
<div class="style" onclick="setStyle('meme',this)">🤪 Meme</div>
<div class="style" onclick="setStyle('yt',this)">📺 YouTube</div>
<div class="style" onclick="setStyle('hacker',this)">💻 Hacker</div>
</div>
</div>
</div>
<button class="btn" onclick="generate()">⚡ Generate Usernames</button>
<div class="results" id="results"></div>
</main>
<script>
let currentStyle='gaming';
function setStyle(s,el){currentStyle=s;document.querySelectorAll('.style').forEach(e=>e.classList.remove('active'));el.classList.add('active')}

const words={
  gaming:{prefix:['Shadow','Dark','Neon','Void','Storm','Blaze','Frost','Nova','Ghost','Rage','Apex','Venom','Chaos','Omega','Toxic','Savage','Elite','Ultra','Turbo','Zero'],suffix:['Kill','Shot','Fury','Blade','Wolf','Hawk','Beast','Sniper','Legend','King','Master','Lord','Reaper','Strike','Force','Ninja','Bomber','Tank','Claw','Fang'],mid:['x','X','_','','0','z']},
  aesthetic:{prefix:['Moon','Cloud','Petal','Velvet','Ivory','Sage','Fern','Coral','Mist','Pearl','Opal','Bloom','Breeze','Willow','Dahlia','Clover','Ember','Hazel','Indigo','Luna'],suffix:['dreams','child','soul','glow','rain','dusk','dawn','tide','light','shade','fall','rose','sky','tea','song','wish','star','wave','beam','muse'],mid:['_','.','-','']},
  edgy:{prefix:['Void','Null','Crypt','Abyss','Dread','Grim','Hex','Doom','Wrath','Scorn','Blight','Scar','Ruin','Vex','Gore','Rot','Ash','Sable','Spite','Feral'],suffix:['born','less','walker','lord','bane','wraith','shade','skull','thorn','crypt','void','haze','blood','soul','raven','death','night','hell','curse','storm'],mid:['_','x','X','0','']},
  cute:{prefix:['Bunny','Kitty','Puppy','Sugar','Honey','Peach','Cookie','Fluffy','Tiny','Sweet','Baby','Cupcake','Sparkle','Sunny','Daisy','Candy','Lollipop','Butter','Maple','Cherry'],suffix:['paws','love','bear','bean','boo','pie','drop','cloud','heart','bloom','bug','cake','fluff','star','kiss','angel','fairy','bubble','cream','sprout'],mid:['_','.','','x']},
  pro:{prefix:['Alex','Jordan','Taylor','Sam','Max','Chris','Dev','Tech','Data','Code','Logic','Stack','Node','Pixel','Byte','Signal','Prime','Core','Forge','Arch'],suffix:['Dev','Tech','Pro','HQ','Labs','Works','Hub','Studio','Design','Build','Create','Made','Craft','IO','Stack','Flow','Run','Ship','Code','Base'],mid:['_','.','-','']},
  meme:{prefix:['Dank','Big','Sus','Smol','Chonk','Yeet','Vibe','Bonk','Bruh','Skibidi','Sigma','Chad','Based','Sussy','Thicc','Turbo','Ultra','Mega','Giga','Epic'],suffix:['Lord','Master','Boss','King','Mode','Energy','Moment','Time','Gang','Squad','Army','Nation','Life','Force','Power','God','Zone','Core','Maxx','Vibes'],mid:['_','x','X','69','420']},
  yt:{prefix:['Mr','The','Just','Its','Not','Hey','Simply','Daily','Epic','Super','Captain','Sir','Dr','Pro','Top','Best','Real','True','Only','My'],suffix:['Gaming','Plays','Live','Show','TV','Cast','Hub','Zone','World','Land','Tube','Time','Clips','Nation','Studios','Central','Media','Network','Channel','Stream'],mid:[' ','_','','']},
  hacker:{prefix:['root','sudo','void','null','sys','net','hack','c0de','d4rk','n3on','z3r0','crypt','gh0st','ph4nt0m','sp3ctr','sh4dow','cyb3r','gl1tch','m4tr1x','v1rus'],suffix:['_sec','_pwn','_0x','_sys','_net','_dev','_h4x','_bin','_hex','_raw','_core','_root','_usr','_src','_exec','_sudo','_rce','_xss','_sqli','_asm'],mid:['','_','0x','$','@']}
};

function generate(){
  const keyword=document.getElementById('keyword').value.trim();
  const w=words[currentStyle];
  const names=new Set();
  
  for(let i=0;i<30;i++){
    const pre=w.prefix[Math.random()*w.prefix.length|0];
    const suf=w.suffix[Math.random()*w.suffix.length|0];
    const mid=w.mid[Math.random()*w.mid.length|0];
    const num=Math.random()>.5?'':(Math.random()*999|0);
    
    if(keyword){
      const k=keyword.charAt(0).toUpperCase()+keyword.slice(1);
      const patterns=[
        k+mid+suf+num,
        pre+mid+k+num,
        k+num+mid+suf,
        pre+k+num,
        k+mid+pre+num,
      ];
      names.add(patterns[Math.random()*patterns.length|0]);
    }
    names.add(pre+mid+suf+num);
    names.add(pre+num+mid+suf);
  }
  
  document.getElementById('results').innerHTML=[...names].slice(0,15).map(n=>
    `<div class="name" onclick="navigator.clipboard.writeText('${n}')"><span class="text">${n}</span><span class="copy">click to copy</span></div>`
  ).join('');
}
generate();
</script>
