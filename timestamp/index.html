<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp — Unix Timestamp Converter & Current Time</title>
<meta name="description" content="Convert Unix timestamps to human-readable dates and vice versa. See current timestamp live. Free online tool.">
<meta name="keywords" content="unix timestamp converter, epoch converter, timestamp to date, date to timestamp, current unix time">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#18181b;--surface:#27272a;--border:#3f3f46;--accent:#22d3ee;--accent2:#06b6d4;--text:#e4e4e7;--muted:#71717a;--green:#4ade80}
body{font-family:'Space Grotesk','Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{padding:.9rem 2rem;border-bottom:1px solid var(--border)}
.logo{font-size:1.2rem;font-weight:700}.logo span{color:var(--accent)}
main{max-width:640px;margin:0 auto;padding:2.5rem 1.5rem}
.live-clock{text-align:center;margin-bottom:2.5rem}
.live-clock .time{font-size:3rem;font-weight:800;font-family:'SF Mono',monospace;color:var(--accent);letter-spacing:.03em}
.live-clock .label{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.live-clock .human{font-size:.9rem;color:var(--text);margin-top:.5rem}
.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem;margin-bottom:1.2rem}
.section h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:1rem;font-weight:600}
.input-row{display:flex;gap:.6rem;margin-bottom:.8rem}
.input-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'SF Mono',monospace;font-size:1rem;padding:.6rem .8rem;border-radius:8px;outline:none}
.input-row input:focus{border-color:var(--accent)}
.input-row button{background:var(--accent);color:var(--bg);border:none;padding:.6rem 1.2rem;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.input-row button:hover{opacity:.85}
.output{font-family:'SF Mono',monospace;font-size:.88rem;color:var(--green);padding:.7rem;background:var(--bg);border-radius:6px;border:1px solid var(--border);min-height:2rem;word-break:break-all}
.output.err{color:#ef4444}
.presets{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.8rem}
.preset{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:.3rem .7rem;border-radius:5px;font-size:.72rem;cursor:pointer;transition:all .15s}
.preset:hover{border-color:var(--accent);color:var(--accent)}
.table-section{margin-top:1.5rem}
.table-section h3{font-size:.8rem;color:var(--muted);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.06em}
table{width:100%;border-collapse:collapse}
table td{padding:.45rem .6rem;font-size:.82rem;border-bottom:1px solid var(--border)}
table td:first-child{color:var(--muted);font-size:.75rem;width:130px}
table td:last-child{font-family:monospace;color:var(--text)}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.7rem;margin-top:2rem}
</style>
</head>
<body>
<style>
.tt-nav{position:sticky;top:0;z-index:999;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1c1c1c;padding:0 1rem;font-family:'Inter',system-ui,sans-serif}
.tt-nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}
.tt-nav a{text-decoration:none;color:#ededed;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem;transition:opacity .15s}
.tt-nav a:hover{opacity:.7}
.tt-nav .tt-logo{font-size:.72rem;font-weight:800;letter-spacing:-.02em}
.tt-nav .tt-logo span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tt-nav .tt-back{color:#a0a0a0;font-size:.68rem}
</style>
<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>

<nav><div class="logo">Time<span>stamp</span></div></nav>
<main>
<div class="live-clock">
<div class="time" id="liveClock">0</div>
<div class="label">Current Unix Timestamp (seconds)</div>
<div class="human" id="liveHuman"></div>
</div>
<div class="section">
<h2>Timestamp → Date</h2>
<div class="input-row"><input id="tsInput" type="text" placeholder="Enter Unix timestamp (e.g. 1718300000)"><button onclick="tsToDate()">Convert</button></div>
<div class="output" id="tsOutput">Result will appear here</div>
<div class="presets">
<div class="preset" onclick="document.getElementById('tsInput').value='0';tsToDate()">Epoch (0)</div>
<div class="preset" onclick="document.getElementById('tsInput').value=Math.floor(Date.now()/1000);tsToDate()">Now</div>
<div class="preset" onclick="document.getElementById('tsInput').value='2000000000';tsToDate()">2B</div>
<div class="preset" onclick="document.getElementById('tsInput').value='4294967295';tsToDate()">Max 32-bit</div>
</div>
</div>
<div class="section">
<h2>Date → Timestamp</h2>
<div class="input-row"><input id="dateInput" type="datetime-local"><button onclick="dateToTs()">Convert</button></div>
<div class="output" id="dateOutput">Result will appear here</div>
</div>
<div class="table-section">
<h3>Common Timestamps</h3>
<table id="commonTable"></table>
</div>
</main>
<footer>&copy; 2026 Timestamp &mdash; Unix timestamp converter. Runs in your browser.</footer>
<script>
const liveClock=document.getElementById('liveClock'),liveHuman=document.getElementById('liveHuman');
function tick(){const now=Math.floor(Date.now()/1000);liveClock.textContent=now;liveHuman.textContent=new Date().toUTCString()}
setInterval(tick,1000);tick();
function tsToDate(){const v=document.getElementById('tsInput').value.trim();const out=document.getElementById('tsOutput');if(!v){out.textContent='Enter a timestamp';out.className='output err';return}
let ts=parseInt(v);if(isNaN(ts)){out.textContent='Invalid timestamp';out.className='output err';return}
if(ts>1e12)ts=Math.floor(ts/1000);
const d=new Date(ts*1000);
out.className='output';
out.innerHTML=`UTC: ${d.toUTCString()}\nLocal: ${d.toLocaleString()}\nISO: ${d.toISOString()}`}
function dateToTs(){const v=document.getElementById('dateInput').value;const out=document.getElementById('dateOutput');if(!v){out.textContent='Select a date';out.className='output err';return}
const d=new Date(v);const ts=Math.floor(d.getTime()/1000);
out.className='output';out.innerHTML=`Seconds: ${ts}\nMilliseconds: ${d.getTime()}\nISO: ${d.toISOString()}`}
const common=[['1 hour ago',Date.now()/1000-3600],['Yesterday',Date.now()/1000-86400],['1 week ago',Date.now()/1000-604800],['Y2K',946684800],['Unix epoch',0],['1 billion',1e9],['2 billion',2e9]];
const table=document.getElementById('commonTable');
common.forEach(([l,ts])=>{const tr=document.createElement('tr');ts=Math.floor(ts);tr.innerHTML=`<td>${l}</td><td>${ts} → ${new Date(ts*1000).toUTCString()}</td>`;table.appendChild(tr)});
const now=new Date();document.getElementById('dateInput').value=now.toISOString().slice(0,16);
</script>
</body>
</html>
