<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#e8e6df;min-height:100vh;color:#16130f}main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
textarea{width:100%;height:140px;padding:.7rem;background:#e8e6df;border:1px solid #f3f1ea;border-radius:10px;color:#16130f;font-family:'SF Mono',monospace;font-size:.82rem;resize:vertical;outline:none;line-height:1.5}
textarea:focus{border-color:#3b82f6}
label{display:block;font-size:.62rem;text-transform:uppercase;color:#888;font-weight:600;margin-bottom:.3rem;margin-top:1rem}
.btns{display:flex;gap:.5rem;margin:1rem 0;flex-wrap:wrap}
.btn{flex:1;padding:.5rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;color:#16130f}
.btn-encode{background:#3b82f6}.btn-decode{background:#10b981}
.btn-sm{background:#f3f1ea;color:#ccc;padding:.35rem .6rem;font-size:.72rem;border-radius:6px;cursor:pointer;border:none}
.ref{background:#e8e6df;border:1px solid #f3f1ea;border-radius:10px;padding:1rem;margin-top:1.5rem}

.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.3rem}
.ref-item{display:flex;justify-content:space-between;font-family:'SF Mono',monospace;font-size:.7rem;padding:.25rem .4rem;background:#e8e6df;border-radius:4px;cursor:pointer}

body{font-family:'Inter',system-ui,sans-serif;padding-top:54px!important}

<body><div class="ttbar"><a href="/" class="l"><i data-lucide="arrow-left"></i> All tools</a><span class="b"><i data-lucide="shapes"></i> TinyTools</span><span class="t">Free tool</span></div>



<main>
<h1>&lt;/&gt; HTML Entity Encoder</h1>
<label>Input</label>
<textarea id="input" placeholder="Paste HTML or text here...">&lt;div class="hello"&gt;Hello &amp; World&lt;/div&gt;</textarea>
<div class="btns">
<button class="btn btn-encode" onclick="encode()">→ Encode</button>
<button class="btn btn-decode" onclick="decode()">← Decode</button>
</div>
<label>Output</label>
<textarea id="output" readonly></textarea>
<div style="display:flex;gap:.4rem;margin-top:.5rem">
<button class="btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('output').value)">📋 Copy</button>
<button class="btn-sm" onclick="document.getElementById('input').value=document.getElementById('output').value;document.getElementById('output').value=''">↕️ Swap</button>
<button class="btn-sm" onclick="document.getElementById('input').value='';document.getElementById('output').value=''">🗑️ Clear</button>
</div>
<div class="ref">
<h3>Common Entities Reference (click to copy)</h3>
<div class="ref-grid" id="refGrid"></div>
</div>
</main>
<script>
const entities=[
  ['&','&amp;'],['<','&lt;'],['>','&gt;'],['"','&quot;'],["'",'&apos;'],
  ['©','&copy;'],['®','&reg;'],['™','&trade;'],['€','&euro;'],['£','&pound;'],
  ['¥','&yen;'],['¢','&cent;'],['§','&sect;'],['¶','&para;'],['†','&dagger;'],
  ['‡','&Dagger;'],['•','&bull;'],['…','&hellip;'],['—','&mdash;'],['–','&ndash;'],
  [' ','&nbsp;'],['←','&larr;'],['→','&rarr;'],['↑','&uarr;'],['↓','&darr;'],
  ['♠','&spades;'],['♣','&clubs;'],['♥','&hearts;'],['♦','&diams;'],['∞','&infin;'],
  ['±','&plusmn;'],['×','&times;'],['÷','&divide;'],['≠','&ne;'],['≤','&le;'],
  ['≥','&ge;'],['°','&deg;'],['µ','&micro;'],['π','&pi;'],['∑','&sum;']
];

document.getElementById('refGrid').innerHTML=entities.map(([char,ent])=>
  `<div class="ref-item" onclick="navigator.clipboard.writeText('${ent}')"><span class="char">${char==' '?'⎵':char}</span><span class="entity">${ent}</span></div>`
).join('');

function encode(){
  const input=document.getElementById('input').value;
  const div=document.createElement('div');
  div.textContent=input;
  document.getElementById('output').value=div.innerHTML;
}

function decode(){
  const input=document.getElementById('input').value;
  const div=document.createElement('div');
  div.innerHTML=input;
  document.getElementById('output').value=div.textContent;
}
</script>
<script>window.addEventListener('DOMContentLoaded',function(){if(window.lucide&&lucide.createIcons)lucide.createIcons();});</script></body>
