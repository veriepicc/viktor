<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Entity Encoder/Decoder — Escape & Unescape HTML Free</title>
<meta name="description" content="Encode and decode HTML entities. Escape special characters. XSS prevention. Supports named and numeric entities. Free HTML encoder.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&lt;&gt;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a0a;min-height:100vh;color:#fff}main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
textarea{width:100%;height:140px;padding:.7rem;background:#111;border:1px solid #222;border-radius:10px;color:#fff;font-family:'SF Mono',monospace;font-size:.82rem;resize:vertical;outline:none;line-height:1.5}
textarea:focus{border-color:#3b82f6}
label{display:block;font-size:.62rem;text-transform:uppercase;color:#888;font-weight:600;margin-bottom:.3rem;margin-top:1rem}
.btns{display:flex;gap:.5rem;margin:1rem 0;flex-wrap:wrap}
.btn{flex:1;padding:.5rem;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;color:#fff}
.btn-encode{background:#3b82f6}.btn-decode{background:#10b981}
.btn-sm{background:#222;color:#ccc;padding:.35rem .6rem;font-size:.72rem;border-radius:6px;cursor:pointer;border:none}
.ref{background:#111;border:1px solid #222;border-radius:10px;padding:1rem;margin-top:1.5rem}
.ref h3{font-size:.65rem;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:.5rem}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.3rem}
.ref-item{display:flex;justify-content:space-between;font-family:'SF Mono',monospace;font-size:.7rem;padding:.25rem .4rem;background:#1a1a1a;border-radius:4px;cursor:pointer}
.ref-item:hover{background:#222}
.ref-item .char{color:#f59e0b}.ref-item .entity{color:#888}
</style>
</head>
<body>
<style>
.tt-nav{position:sticky;top:0;z-index:999;background:rgba(5,5,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid #1c1c1c;padding:0 1rem;font-family:'Inter',system-ui,sans-serif}
.tt-nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}
.tt-nav a{text-decoration:none;color:#ededed;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem;transition:opacity .15s}
.tt-nav a:hover{opacity:.7}
.tt-nav .tt-logo{font-size:.72rem;font-weight:800;letter-spacing:-.02em}
.tt-nav .tt-logo span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tt-nav .tt-back{color:#a0a0a0;font-size:.68rem}
</style>
<div class="tt-nav"><div class="tt-nav-inner"><a href="../" class="tt-back">← Back</a><a href="../" class="tt-logo">🛠️ <span>TinyTools</span></a></div></div>

<main>
<h1>&lt;/&gt; HTML Entity Encoder</h1>
<label>Input</label>
<textarea id="input" placeholder="Paste HTML or text here...">&lt;div class="hello"&gt;Hello &amp; World&lt;/div&gt;</textarea>
<div class="btns">
<button class="btn btn-encode" onclick="encode()">→ Encode</button>
<button class="btn btn-decode" onclick="decode()">← Decode</button>
</div>
<label>Output</label>
<textarea id="output" readonly></textarea>
<div style="display:flex;gap:.4rem;margin-top:.5rem">
<button class="btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('output').value)">📋 Copy</button>
<button class="btn-sm" onclick="document.getElementById('input').value=document.getElementById('output').value;document.getElementById('output').value=''">↕️ Swap</button>
<button class="btn-sm" onclick="document.getElementById('input').value='';document.getElementById('output').value=''">🗑️ Clear</button>
</div>
<div class="ref">
<h3>Common Entities Reference (click to copy)</h3>
<div class="ref-grid" id="refGrid"></div>
</div>
</main>
<script>
const entities=[
  ['&','&amp;'],['<','&lt;'],['>','&gt;'],['"','&quot;'],["'",'&apos;'],
  ['©','&copy;'],['®','&reg;'],['™','&trade;'],['€','&euro;'],['£','&pound;'],
  ['¥','&yen;'],['¢','&cent;'],['§','&sect;'],['¶','&para;'],['†','&dagger;'],
  ['‡','&Dagger;'],['•','&bull;'],['…','&hellip;'],['—','&mdash;'],['–','&ndash;'],
  [' ','&nbsp;'],['←','&larr;'],['→','&rarr;'],['↑','&uarr;'],['↓','&darr;'],
  ['♠','&spades;'],['♣','&clubs;'],['♥','&hearts;'],['♦','&diams;'],['∞','&infin;'],
  ['±','&plusmn;'],['×','&times;'],['÷','&divide;'],['≠','&ne;'],['≤','&le;'],
  ['≥','&ge;'],['°','&deg;'],['µ','&micro;'],['π','&pi;'],['∑','&sum;']
];

document.getElementById('refGrid').innerHTML=entities.map(([char,ent])=>
  `<div class="ref-item" onclick="navigator.clipboard.writeText('${ent}')"><span class="char">${char==' '?'⎵':char}</span><span class="entity">${ent}</span></div>`
).join('');

function encode(){
  const input=document.getElementById('input').value;
  const div=document.createElement('div');
  div.textContent=input;
  document.getElementById('output').value=div.innerHTML;
}

function decode(){
  const input=document.getElementById('input').value;
  const div=document.createElement('div');
  div.innerHTML=input;
  document.getElementById('output').value=div.textContent;
}
</script>
</body>
</html>
