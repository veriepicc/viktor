<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyTools — 50 Free Online Tools for Developers, Designers & Everyone</title>
<meta name="description" content="50 free browser-based tools for developers, designers, and everyone. JSON formatter, image tools, calculators, text tools, code generators, and more. No sign-up, no tracking.">
<meta name="keywords" content="free online tools, developer tools, json formatter, image compressor, password generator, hash generator, regex tester, color picker, text tools, code tools, web tools">
<meta property="og:title" content="TinyTools — 50 Free Online Tools">
<meta property="og:description" content="Developer tools, text tools, image tools, calculators & more. All free, all in your browser.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#18181b;--border:#27272a;--accent:#8b5cf6;--accent2:#06b6d4;--text:#fafafa;--muted:#71717a;--card-hover:#1f1f23}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hero{text-align:center;padding:4rem 1.5rem 2rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 80%,rgba(139,92,246,.08),transparent 50%);pointer-events:none}
.hero h1{font-size:2.8rem;font-weight:900;letter-spacing:-.03em;line-height:1.1;margin-bottom:.6rem}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:1.05rem;max-width:500px;margin:0 auto 2rem}
.search-bar{max-width:500px;margin:0 auto 1rem;position:relative}
.search-bar input{width:100%;padding:.75rem 1rem .75rem 2.8rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.95rem;outline:none;font-family:inherit;transition:border-color .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar .icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem}
.filters{display:flex;gap:.3rem;justify-content:center;flex-wrap:wrap;padding:0 1.5rem;margin-bottom:2.5rem}
.filter{padding:.35rem .8rem;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--surface);transition:all .15s}
.filter.active{border-color:var(--accent);color:var(--accent);background:rgba(139,92,246,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.6rem;max-width:1100px;margin:0 auto;padding:0 1.5rem 3rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:.3rem}
.card:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-2px)}
.card .emoji{font-size:1.6rem;margin-bottom:.2rem}
.card .name{font-size:.88rem;font-weight:700}
.card .desc{font-size:.72rem;color:var(--muted);line-height:1.4}
.card .tag{display:inline-block;font-size:.6rem;color:var(--accent);background:rgba(139,92,246,.1);padding:.1rem .4rem;border-radius:4px;margin-top:.2rem;font-weight:600}
.count-badge{font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:1.5rem}
.count-badge strong{color:var(--accent)}
footer{text-align:center;padding:2rem 1.5rem;color:var(--muted);font-size:.72rem;border-top:1px solid var(--border)}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="hero">
<h1>Tiny<span>Tools</span></h1>
<p>50 free tools that run in your browser. No sign-up, no tracking, no BS.</p>
</div>
<div class="search-bar"><span class="icon">🔍</span><input id="search" placeholder="Search tools..." oninput="filter()"></div>
<div class="filters" id="filters"></div>
<div class="count-badge" id="countBadge"><strong>50</strong> tools</div>
<div class="grid" id="grid"></div>
<footer>
<p>&copy; 2026 TinyTools &mdash; All tools run 100% client-side. Your data never leaves your browser.</p>
</footer>
<script>
const tools=[
  // Dev Tools
  {id:'jsonprettify',emoji:'📋',name:'JSON Prettify',desc:'Format, validate & minify JSON with syntax highlighting',cat:'Dev'},
  {id:'jsonfixer',emoji:'🔧',name:'JSON Fixer',desc:'Auto-fix broken JSON — trailing commas, single quotes, comments',cat:'Dev'},
  {id:'jsontocode',emoji:'⚡',name:'JSON to Code',desc:'Generate TypeScript, Python, Go, Rust, Java, C#, Zod types from JSON',cat:'Dev'},
  {id:'regexlab',emoji:'🔬',name:'RegexLab',desc:'Test regex patterns with live highlighting and match extraction',cat:'Dev'},
  {id:'hashcraft',emoji:'🔐',name:'HashCraft',desc:'Generate MD5, SHA-1, SHA-256, SHA-384, SHA-512 hashes',cat:'Dev'},
  {id:'baseshift',emoji:'🔢',name:'BaseShift',desc:'Convert numbers between binary, octal, decimal, hex with bit visualization',cat:'Dev'},
  {id:'crontranslate',emoji:'⏰',name:'CronTranslate',desc:'Translate cron expressions to plain English with next run times',cat:'Dev'},
  {id:'timestamp',emoji:'🕐',name:'Timestamp',desc:'Convert between Unix timestamps and human-readable dates',cat:'Dev'},
  {id:'htmlpreview',emoji:'🖥️',name:'HTML Preview',desc:'Live HTML/CSS/JS editor with instant preview (like CodePen)',cat:'Dev'},
  {id:'blindfold',emoji:'🔒',name:'Blindfold',desc:'AES-256-GCM text encryption and decryption',cat:'Dev'},
  {id:'slugify',emoji:'🐌',name:'Slugify',desc:'Convert text to URL-friendly slugs with unicode handling',cat:'Dev'},
  {id:'ipv4calc',emoji:'🔢',name:'IPv4 Calc',desc:'Subnet calculator — CIDR, IP ranges, masks, binary',cat:'Dev'},
  {id:'tableconvert',emoji:'📊',name:'TableConvert',desc:'Convert CSV to JSON, HTML, Markdown, SQL, XML, TSV',cat:'Dev'},
  {id:'metatags',emoji:'🏷️',name:'MetaTags',desc:'Generate SEO meta tags, Open Graph & Twitter Card tags',cat:'Dev'},

  // Text Tools
  {id:'textcount',emoji:'📝',name:'TextCount',desc:'Word count, character count, reading time, paragraph stats',cat:'Text'},
  {id:'diffcheck',emoji:'📑',name:'DiffCheck',desc:'Compare two texts side-by-side with highlighted differences',cat:'Text'},
  {id:'readtime',emoji:'📖',name:'ReadTime',desc:'Reading time + Flesch-Kincaid readability score calculator',cat:'Text'},
  {id:'casecraft',emoji:'🔤',name:'CaseCraft',desc:'Convert text between 14 cases: camelCase, snake_case, PascalCase...',cat:'Text'},
  {id:'loremcraft',emoji:'📄',name:'LoremCraft',desc:'Generate placeholder text in 4 styles: Lorem, Hipster, Corporate, Pirate',cat:'Text'},
  {id:'wordfreq',emoji:'📝',name:'WordFreq',desc:'Analyze word frequency — most common words, diversity ratio',cat:'Text'},
  {id:'fliptext',emoji:'🔄',name:'FlipText',desc:'Upside down, mirror, zalgo, bold, bubble & 12 more text styles',cat:'Text'},
  {id:'markdownview',emoji:'📝',name:'MarkdownView',desc:'Markdown editor with live preview, split-pane layout',cat:'Text'},
  {id:'texttable',emoji:'📋',name:'TextTable',desc:'Generate ASCII, Markdown, Unicode & HTML tables from CSV data',cat:'Text'},
  {id:'emojiSearch',emoji:'😀',name:'EmojiSearch',desc:'Search 700+ emojis by keyword or category, click to copy',cat:'Text'},

  // Design Tools
  {id:'chromaforge',emoji:'🎨',name:'ChromaForge',desc:'Generate beautiful color palettes with export options',cat:'Design'},
  {id:'cssgrad',emoji:'🌈',name:'CSSGrad',desc:'Create CSS gradients visually with live preview and code',cat:'Design'},
  {id:'shadowcraft',emoji:'🌓',name:'ShadowCraft',desc:'CSS box shadow generator with multi-layer support',cat:'Design'},
  {id:'colorblind',emoji:'👁️',name:'ColorBlind',desc:'WCAG contrast checker + color blindness simulation',cat:'Design'},
  {id:'faviconforge',emoji:'⭐',name:'FaviconForge',desc:'Generate favicons from text, emoji, or uploaded images',cat:'Design'},
  {id:'svgmake',emoji:'✏️',name:'SVGMake',desc:'Generate SVG icons and shapes with customizable parameters',cat:'Design'},
  {id:'aspect',emoji:'📐',name:'Aspect',desc:'Aspect ratio calculator with resize lock & 12 presets',cat:'Design'},
  {id:'screensizer',emoji:'📱',name:'ScreenSizer',desc:'Preview websites at different screen sizes (iPhone→4K)',cat:'Design'},
  {id:'chartmaker',emoji:'📊',name:'ChartMaker',desc:'Create bar, line, pie & donut charts from data, download PNG',cat:'Design'},

  // Image Tools
  {id:'pixsqueeze',emoji:'🖼️',name:'PixSqueeze',desc:'Compress images to WebP/JPEG/PNG with quality control',cat:'Image'},
  {id:'imgcrop',emoji:'✂️',name:'ImgCrop',desc:'Crop images with presets for social media (1:1, 16:9, 4:5...)',cat:'Image'},
  {id:'qrcraft',emoji:'📱',name:'QRCraft',desc:'Generate QR codes for URL, text, WiFi, email, phone',cat:'Image'},

  // AI Tools
  {id:'promptbox',emoji:'🤖',name:'PromptBox',desc:'20 AI prompt templates across 8 categories with variable builder',cat:'AI'},
  {id:'tokencounter',emoji:'🔢',name:'TokenCounter',desc:'Count AI tokens + cost for GPT-4o, Claude, Gemini, DeepSeek',cat:'AI'},
  {id:'aidetector',emoji:'🔍',name:'AI Detector',desc:'Detect AI-generated text using statistical heuristics',cat:'AI'},

  // Utilities
  {id:'passcraft',emoji:'🔑',name:'PassCraft',desc:'Generate secure passwords with strength meter',cat:'Utility'},
  {id:'unitflip',emoji:'📏',name:'UnitFlip',desc:'Convert units across 8 categories: length, weight, temp, speed...',cat:'Utility'},
  {id:'bmi',emoji:'⚖️',name:'BMI Calculator',desc:'Calculate Body Mass Index — metric and imperial',cat:'Utility'},
  {id:'loan',emoji:'🏦',name:'LoanCalc',desc:'Mortgage/loan payment calculator with amortization schedule',cat:'Utility'},
  {id:'pomodoro',emoji:'🍅',name:'Pomodoro',desc:'Focus timer — 25/5 Pomodoro technique with session counter',cat:'Utility'},
  {id:'noise',emoji:'🎧',name:'NoiseMachine',desc:'White, pink, brown noise & rain sounds for focus/sleep',cat:'Utility'},

  // Network
  {id:'ipscan',emoji:'🌐',name:'IPScan',desc:'Your IP address, location, ISP, browser & device info',cat:'Network'},
  {id:'speedtest',emoji:'⚡',name:'SpeedTest',desc:'Page load performance analyzer with timing breakdown',cat:'Network'},
  {id:'linkshorten',emoji:'🔗',name:'LinkShorten',desc:'Parse, encode/decode, build & clean URLs',cat:'Network'},
  {id:'metacheck',emoji:'🔎',name:'MetaCheck',desc:'Preview Open Graph & meta tags for any URL',cat:'Network'},
];

const cats=[...new Set(tools.map(t=>t.cat))];
document.getElementById('filters').innerHTML=`<div class="filter active" onclick="setCat('all',this)">All (${tools.length})</div>`+cats.map(c=>`<div class="filter" onclick="setCat('${c}',this)">${c} (${tools.filter(t=>t.cat===c).length})</div>`).join('');

let currentCat='all';
function setCat(c,el){currentCat=c;document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'));el.classList.add('active');filter()}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=tools.filter(t=>{
    if(currentCat!=='all'&&t.cat!==currentCat)return false;
    if(q)return t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q);
    return true;
  });
  document.getElementById('countBadge').innerHTML=`<strong>${filtered.length}</strong> tool${filtered.length!==1?'s':''}`;
  document.getElementById('grid').innerHTML=filtered.map(t=>
    `<a class="card" href="${t.id}/" onclick=""><div class="emoji">${t.emoji}</div><div class="name">${t.name}</div><div class="desc">${t.desc}</div><span class="tag">${t.cat}</span></a>`
  ).join('');
}
filter();
</script>
</body>
</html>
